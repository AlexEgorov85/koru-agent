version: "1.0.0"
contract_type: "input"
skill: "llm"
capability: "llm.generate"
schema:
  type: "object"
  required:
    - "prompt"
  properties:
    prompt:
      type: "string"
      description: "Основной текст запроса"
    system_prompt:
      type: "string"
      description: "Роль системы/ассистента"
      nullable: true
    temperature:
      type: "number"
      description: "Креативность генерации (0.0-1.0)"
      minimum: 0.0
      maximum: 1.0
      default: 0.7
    max_tokens:
      type: "integer"
      description: "Максимальная длина ответа"
      minimum: 1
      maximum: 4096
      default: 500
    top_p:
      type: "number"
      description: "Фильтрация токенов по вероятности"
      minimum: 0.0
      maximum: 1.0
      default: 0.95
    frequency_penalty:
      type: "number"
      description: "Штраф за повторение"
      minimum: 0.0
      maximum: 2.0
      default: 0.0
    presence_penalty:
      type: "number"
      description: "Штраф за новые токены"
      minimum: 0.0
      maximum: 2.0
      default: 0.0
    stream:
      type: "boolean"
      description: "Флаг потоковой генерации"
      default: false
    structured_output:
      type: "object"
      description: "Конфигурация структурированного вывода"
      properties:
        output_model:
          type: "string"
          description: "Имя модели (для сериализации в события)"
        schema_def:
          type: "object"
          description: "JSON Schema (для провайдеров с нативной поддержкой)"
        max_retries:
          type: "integer"
          description: "Максимальное количество попыток"
          minimum: 1
          maximum: 5
          default: 3
        strict_mode:
          type: "boolean"
          description: "Строгая валидация (все поля обязательны)"
          default: true
      nullable: true
    metadata:
      type: "object"
      description: "Дополнительные параметры для конкретных провайдеров"
      additionalProperties: true
      default: {}
    correlation_id:
      type: "string"
      description: "ID для трассировки запроса"
      nullable: true
    capability_name:
      type: "string"
      description: "Имя capability для интеграции с PromptService"
      nullable: true