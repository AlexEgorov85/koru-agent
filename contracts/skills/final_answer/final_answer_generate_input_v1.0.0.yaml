version: "1.0.0"
contract_type: "input"
skill: "final_answer"
capability: "final_answer.generate"
schema:
  type: "object"
  properties:
    include_steps:
      type: "boolean"
      description: "Включать ли в ответ информацию о шагах выполнения"
      default: true
    include_evidence:
      type: "boolean"
      description: "Включать ли в ответ доказательства и источники"
      default: true
    format_type:
      type: "string"
      description: "Тип форматирования ответа"
      enum: ["concise", "detailed", "structured"]
      default: "detailed"
    custom_prompt:
      type: "string"
      description: "Пользовательский промпт для генерации"
      nullable: true