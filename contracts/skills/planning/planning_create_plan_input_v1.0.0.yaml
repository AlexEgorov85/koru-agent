version: "1.0.0"
contract_type: "input"
skill: "planning"
capability: "planning.create_plan"
schema:
  type: "object"
  required:
    - "goal"
  properties:
    goal:
      type: "string"
      description: "Цель, которую нужно достичь"
      minLength: 3
    max_steps:
      type: "integer"
      description: "Максимальное количество шагов в плане"
      default: 10
    context:
      type: "string"
      description: "Дополнительный контекст для планирования"
    strategy:
      type: "string"
      description: "Стратегия планирования"
      default: "iterative"