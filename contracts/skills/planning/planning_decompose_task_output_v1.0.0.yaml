version: "1.0.0"
contract_type: "output"
skill: "planning"
capability: "planning.decompose_task"
schema:
  type: "object"
  required:
    - "parent_task_id"
    - "original_task"
    - "subtasks"
    - "decomposition_strategy"
  properties:
    parent_task_id:
      type: "string"
      description: "ID родительской задачи"
    original_task:
      type: "string"
      description: "Оригинальное описание задачи"
    subtasks:
      type: "array"
      items:
        type: "object"
        required:
          - "subtask_id"
          - "description"
          - "complexity"
        properties:
          subtask_id:
            type: "string"
            description: "ID подзадачи"
          description:
            type: "string"
            description: "Описание подзадачи"
          complexity:
            type: "string"
            description: "Сложность подзадачи"
            enum: ["low", "medium", "high"]
          estimated_steps:
            type: "integer"
            description: "Оценочное количество шагов"
            minimum: 1
            default: 3
    decomposition_strategy:
      type: "string"
      description: "Стратегия декомпозиции"
      enum: ["sequential", "parallel", "hierarchical"]
    metadata:
      type: "object"
      description: "Дополнительные метаданные"
      additionalProperties: true
      default: {}