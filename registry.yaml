profile: prod

# === ГЛОБАЛЬНЫЕ ВЕРСИИ ТОЛЬКО ДЛЯ АГЕНТА ===
active_prompts: {}

active_contracts: {}

# === КОНФИГУРАЦИЯ КОМПОНЕНТОВ (изолированная!) ===
services:
  prompt_service:
    enabled: true
    dependencies: []

  contract_service:
    enabled: true
    dependencies: []

  table_description_service:
    enabled: true
    dependencies: ["default_db"]

  sql_generation_service:
    enabled: true
    dependencies: ["default_db"]
    prompt_versions:
      sql_generation.generate_query: "v1.0.0"
    input_contract_versions:
      sql_generation.generate_query: "v1.0.0"
    output_contract_versions:
      sql_generation.generate_query: "v1.0.0"

  sql_query_service:
    enabled: true
    dependencies: ["default_db", "sql_validator_service"]  # Указываем зависимость

  sql_validator_service:
    enabled: true
    dependencies: []

skills:
  planning:
    enabled: true
    prompt_versions:
      planning.create_plan: "v1.0.0"
    input_contract_versions:
      planning.create_plan: "v1.0.0"
    output_contract_versions:
      planning.create_plan: "v1.0.0"
    dependencies: []
    parameters:
      max_iterations: 5
  
  book_library:
    enabled: true
    prompt_versions:
      book_library.search_books: "v1.0.0"
    input_contract_versions:
      book_library.search_books: "v1.0.0"
    output_contract_versions:
      book_library.search_books: "v1.0.0"
    dependencies: ["default_db"]
    parameters:
      max_results: 10

tools:
  sql_tool:
    enabled: true
    dependencies: ["default_db"]
    parameters:
      max_rows: 1000
  
  file_tool:
    enabled: true
    dependencies: []
    parameters:
      allowed_extensions: [".txt", ".pdf", ".docx"]

strategies:
  react:
    enabled: true
    dependencies: []
    parameters:
      max_thoughts: 5

behaviors:
  react_pattern:
    enabled: true
    dependencies: []
    parameters:
      max_thoughts: 5
    prompt_versions:
      behavior.react.think: "v1.0.0"
      behavior.react.act: "v1.0.0"
      behavior.react.observe: "v1.0.0"
    input_contract_versions:
      behavior.react.think: "v1.0.0"
      behavior.react.act: "v1.0.0"
      behavior.react.observe: "v1.0.0"
    output_contract_versions:
      behavior.react.think: "v1.0.0"
      behavior.react.act: "v1.0.0"
      behavior.react.observe: "v1.0.0"
      
  planning_pattern:
    enabled: true
    dependencies: []
    parameters: {}
    prompt_versions:
      behavior.planning.decompose: "v1.0.0"
      behavior.planning.sequence: "v1.0.0"
    input_contract_versions:
      behavior.planning.decompose: "v1.0.0"
      behavior.planning.sequence: "v1.0.0"
    output_contract_versions:
      behavior.planning.decompose: "v1.0.0"
      behavior.planning.sequence: "v1.0.0"