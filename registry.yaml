strategies:
  react:
    dependencies: []
    enabled: true
    manifest_path: data/manifests/strategies/react/manifest.yaml
    parameters:
      max_thoughts: 5

vector_search:
  enabled: true
  indexes:
    knowledge: "knowledge_index.faiss"
    history: "history_index.faiss"
    docs: "docs_index.faiss"
    books: "books_index.faiss"
  faiss:
    index_type: "Flat"
    nlist: 100
    nprobe: 10
    metric: "IP"
  embedding:
    model_name: "all-MiniLM-L6-v2"
    dimension: 384
    device: "cpu"
    batch_size: 32
  chunking:
    enabled: true
    strategy: "text"
    chunk_size: 500
    chunk_overlap: 50
    min_chunk_size: 100
  storage:
    base_path: "./data/vector"
    backup_enabled: true
    backup_interval_hours: 24
  cache:
    enabled: true
    ttl_hours: 168
    max_size_mb: 100
  default_top_k: 10
  max_top_k: 100
  default_min_score: 0.5
  max_workers: 4
  timeout_seconds: 30.0

tools:
  vector_books_tool:
    dependencies: []
    enabled: true
    input_contract_versions:
      vector_books.search: v1.0.0
      vector_books.get_document: v1.0.0
      vector_books.analyze: v1.0.0
      vector_books.query: v1.0.0
    manifest_path: data/manifests/tools/vector_books_tool/manifest.yaml
    output_contract_versions:
      vector_books.search: v1.0.0
      vector_books.get_document: v1.0.0
      vector_books.analyze: v1.0.0
      vector_books.query: v1.0.0
    parameters:
      default_top_k: 10
      max_top_k: 100
      cache_enabled: true
  file_tool:
    dependencies: []
    enabled: true
    input_contract_versions:
      file_tool.read_write: v1.0.0
    manifest_path: data/manifests/tools/file_tool/manifest.yaml
    output_contract_versions:
      file_tool.read_write: v1.0.0
    parameters:
      allowed_extensions:
      - .txt
      - .pdf
      - .docx
  sql_tool:
    dependencies:
    - default_db
    enabled: true
    input_contract_versions:
      sql_tool.execute_query: v1.0.0
    manifest_path: data/manifests/tools/sql_tool/manifest.yaml
    output_contract_versions:
      sql_tool.execute_query: v1.0.0
    parameters:
      max_rows: 1000

# LLM провайдеры
llm_providers:
  default_llm:
    provider_type: llama_cpp
    model_name: qwen-4b
    enabled: true
    fallback_providers: []
    timeout_seconds: 1200.0
    parameters:
      model_path: "C:\\Users\\Алексей\\Documents\\WORK\\llm_models\\Qwen3\\Qwen3-4B-Instruct-2507-F16.gguf"
      n_ctx: 20048
      n_gpu_layers: 0
      n_batch: 512
      temperature: 0.2
      max_tokens: 512
      verbose: false
      stop: ["\"", "</s>"]

# Параметры агента
agent:
  max_steps: 10
  max_retries: 3
  llm_timeout_seconds: 120.0
  temperature: 0.7
  side_effects_enabled: true
  detailed_metrics: false
  enable_self_reflection: true
  enable_context_window_management: true
