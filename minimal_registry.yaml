profile: prod

# === ГЛОБАЛЬНЫЕ ВЕРСИИ ТОЛЬКО ДЛЯ АГЕНТА ===
active_prompts: {}

active_contracts: {}

# === КОНФИГУРАЦИЯ КОМПОНЕНТОВ (изолированная!) ===
services:
  prompt_service:
    enabled: true
    dependencies: []
  
  contract_service:
    enabled: true
    dependencies: []

  table_description_service:
    enabled: true
    dependencies: []

  sql_generation_service:
    enabled: true
    dependencies: []

  sql_query_service:
    enabled: true
    dependencies: []

  sql_validator_service:
    enabled: true
    dependencies: []

skills:
  planning:
    enabled: true
    prompt_versions:
      planning.create_plan: "v1.0.0"
    input_contract_versions:
      planning.create_plan: "v1.0.0"
    output_contract_versions:
      planning.create_plan: "v1.0.0"
    dependencies: []
    parameters:
      max_iterations: 5
  
  book_library:
    enabled: true
    prompt_versions:
      book_library.search_books: "v1.0.0"
    input_contract_versions:
      book_library.search_books: "v1.0.0"
    output_contract_versions:
      book_library.search_books: "v1.0.0"
    dependencies: []
    parameters:
      max_results: 10

tools:
  sql_tool:
    enabled: true
    dependencies: []
    parameters:
      max_rows: 1000
  
  file_tool:
    enabled: true
    dependencies: []
    parameters:
      allowed_extensions: [".txt", ".pdf", ".docx"]

strategies:
  react:
    enabled: true
    dependencies: []
    parameters:
      max_thoughts: 5