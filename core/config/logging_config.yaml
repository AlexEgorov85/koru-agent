# core/config/logging_config.yaml
# Конфигурация универсального механизма логирования

logging:
  # Уровень логирования: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: INFO

  # Формат логов
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"

  # Тип формата: "text" или "json"
  format_type: text

  # Использовать цвета для консольного вывода
  use_colors: true

  # Что логировать
  log_execution_start: true
  log_execution_end: true
  log_parameters: true
  log_result: true
  log_errors: true
  log_duration: true

  # Исключения (чувствительные данные)
  exclude_parameters:
    - password
    - token
    - api_key
    - secret
    - credential
    - authorization
    - access_token
    - refresh_token

  # Ограничения
  max_parameter_length: 1000
  max_result_length: 5000

  # EventBus интеграция
  enable_event_bus: true

  # Файловое логирование (включено!)
  log_file: "logs/agent.log"  # ← Включено для записи логов в файл
  log_file_max_size: 10485760  # 10MB
  log_file_backup_count: 5

  # Настройки для конкретных модулей (опционально)
  module_levels:
    # Снижение шума от слишком болтливых модулей → только CRITICAL в консоль (остальное в файл)
    core.application.context.application_context: INFO  # INFO для логирования создания компонентов
    core.application.components.component_factory: INFO  # INFO для логирования создания компонентов
    core.components.base_component: CRITICAL
    core.application.services: INFO  # INFO для логирования инициализации сервисов
    core.application.skills: CRITICAL
    core.application.tools: CRITICAL
    core.application.behaviors: INFO  # INFO для логирования вызовов behavior
    core.infrastructure.context: CRITICAL
    core.application.agent.runtime: INFO  # INFO для логирования запуска агента

    # LLM события → только в файл (DEBUG)
    core.infrastructure.event_bus.llm_event_subscriber: DEBUG

    # LLM провайдеры → INFO в файл (промпты и ответы)
    llm.LlamaCppProvider: INFO
    llm.MockProvider: INFO

  # Индексация логов (для поиска сессий)
  indexing:
    enabled: true           # Отключите для ускорения разработки
    update_interval_sec: 900  # 15 минут

  # Хранение логов
  retention:
    active_days: 7
    archive_months: 3       # 3 месяца вместо 12 для разработки
    max_size_mb: 100

  # Symlinks
  symlinks:
    enabled: true
