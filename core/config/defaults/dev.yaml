agent:
  default_strategy: react
  enable_context_window_management: true
  enable_self_reflection: true
  llm_timeout_seconds: 1200.0
  max_retries: 3
  max_steps: 10
  temperature: 0.2
agent_defaults:
  max_steps: 10
  max_retries: 3
  temperature: 0.2
  timeout_seconds: 300.0
  enable_self_reflection: true
  enable_context_window_management: true
  enable_benchmark: false
  profile: dev
  observer_trigger_mode: on_error
data_dir: data
db_providers:
  default_db:
    enabled: true
    parameters:
      database: postgres
      host: localhost
      password: '1'
      pool_size: 5
      port: 5432
      sslmode: disable
      timeout: 30.0
      username: postgres
    provider_type: postgres
debug: true
llm_providers:
  default_llm:
    enabled: true
    fallback_providers: []
    model_name: GigaChat-Pro
    parameters:
      credentials: ""  # Укажите ключ GigaChat или задайте переменную GIGACHAT_CREDENTIALS
      temperature: 0.2
      max_tokens: 4096
      timeout: 120.0
      profanity_check: false
    provider_type: gigachat
    timeout_seconds: 300.0
log_dir: logs/dev
log_level: DEBUG
profile: dev
providers:
  cache:
    enabled: true
    ttl: 300
    type: memory
  monitoring:
    enabled: true
    endpoint: http://localhost:9090
security:
  secrets_path: core/config/defaults/secrets_dev.yaml
  token_expiry_minutes: 60
vector_search:
  chunking:
    chunk_overlap: 50
    chunk_size: 500
    min_chunk_size: 50
  embedding:
    model_name: sentence-transformers/all-MiniLM-L6-v2
    local_model_path: null
    dimension: 384
    instruction: Дан вопрос, необходимо найти абзац текста с ответом
    use_instruction: true
    max_length: 512
    device: cpu
  enabled: true
  faiss:
    index_type: Flat
    metric: IP
  indexes:
    authors: authors_index.faiss
    audits: audits_index.faiss
    violations: violations_index.faiss
    books: books_index.faiss
  storage:
    base_path: data/vector
version: 5.40.2
