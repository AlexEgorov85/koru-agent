# config/dev.yaml
# Конфигурация для разработки
# Версия 5.15.0 - масштабный рефакторинг: устранение дублирования кода
version: "5.15.0"
profile: dev
debug: true
log_level: DEBUG
log_dir: logs/dev
data_dir: data

# Конфигурация LLM провайдеров
llm_providers:
  default_llm:
    provider_type: llama_cpp
    model_name: qwen-4b
    enabled: true
    fallback_providers: []
    timeout_seconds: 300.0  # 5 минут для LLM вызовов
    parameters:
      model_path: "C:\\Users\\Алексей\\Documents\\WORK\\llm_models\\Qwen3\\Qwen3-4B-Instruct-2507-F16.gguf"
      n_ctx: 20048
      n_gpu_layers: 0
      n_batch: 512
      temperature: 0.2
      max_tokens: 512
      verbose: false
      stop: ["\"", "</s>"]

# Конфигурация баз данных
db_providers:
  default_db:
    provider_type: postgres
    enabled: true
    parameters:
      host: "localhost"
      port: 5432
      database: "postgres"
      username: "postgres"
      password: "1"
      sslmode: "disable"
      timeout: 30.0
      pool_size: 5

# Параметры агента
agent:
  max_steps: 10
  max_retries: 3
  llm_timeout_seconds: 1200.0
  temperature: 0.2
  default_strategy: "react"
  enable_self_reflection: true
  enable_context_window_management: true

# Безопасность
security:
  secrets_path: "core/config/defaults/secrets_dev.yaml"
  token_expiry_minutes: 60

# Дополнительные провайдеры
providers:
  cache:
    enabled: true
    type: "memory"
    ttl: 300
  monitoring:
    enabled: true
    endpoint: "http://localhost:9090"