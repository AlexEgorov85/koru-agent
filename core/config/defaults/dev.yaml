agent:
  default_strategy: react
  enable_context_window_management: true
  enable_self_reflection: true
  llm_timeout_seconds: 1200.0
  max_retries: 3
  max_steps: 10
  temperature: 0.2
data_dir: data
db_providers:
  books_db:
    enabled: true
    parameters:
      db_path: data/books.db
      timeout: 30.0
    provider_type: sqlite
  default_db:
    enabled: true
    parameters:
      database: postgres
      host: localhost
      password: '1'
      pool_size: 5
      port: 5432
      sslmode: disable
      timeout: 30.0
      username: postgres
    provider_type: postgres
debug: true
llm_providers:
  default_llm:
    enabled: true
    fallback_providers: []
    model_name: qwen/qwen3.6-plus:free
    parameters:
      api_key: "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"
      temperature: 0.2
      max_tokens: 4096
      timeout_seconds: 120.0
    provider_type: openrouter
    timeout_seconds: 300.0
log_dir: logs/dev
log_level: DEBUG
profile: dev
providers:
  cache:
    enabled: true
    ttl: 300
    type: memory
  monitoring:
    enabled: true
    endpoint: http://localhost:9090
security:
  secrets_path: core/config/defaults/secrets_dev.yaml
  token_expiry_minutes: 60
vector_search:
  chunking:
    chunk_overlap: 50
    chunk_size: 500
    min_chunk_size: 50
  embedding:
    dimension: 384
    model_name: models/embedding/all-MiniLM-L6-v2
  enabled: true
  faiss:
    index_type: Flat
    metric: IP
  indexes:
    books: books_index.faiss
    docs: docs_index.faiss
    history: history_index.faiss
    knowledge: knowledge_index.faiss
    authors: authors_index.faiss
  storage:
    base_path: data/vector
version: 5.15.0
