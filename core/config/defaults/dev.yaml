# config/dev.yaml
# Конфигурация для разработки
profile: dev
debug: true
log_level: DEBUG
log_dir: logs/dev
data_dir: data/dev
llm_providers:
  default_llm:
    type_provider: openrouter
    model_name: "tngtech/deepseek-r1t2-chimera:free"  # или другая поддерживаемая модель
    enabled: true
    parameters:
      api_key: "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"
      base_url: "https://openrouter.ai/api/v1"
      temperature: 0.7
      max_tokens: 2048
      top_p: 1.0
      frequency_penalty: 0.0
      presence_penalty: 0.0

db_providers:
  default_db:
    type_provider: postgres
    enabled: true
    parameters:
      host: "localhost"
      port: 5432
      database: "postgres"
      username: "postgres"
      password: "1"
      sslmode: "disable"
      timeout: 30.0
      pool_size: 5
skills:
  planning:
    enabled: true
  book_library:
    enabled: true
    parameters:
      max_books_per_search: 10
tools:
  SQLTool:
    enabled: true
  file_tool:
    enabled: true
security:
  secrets_path: config/secrets_dev.yaml