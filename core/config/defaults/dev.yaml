agent:
  default_strategy: react
  enable_context_window_management: true
  enable_self_reflection: true
  llm_timeout_seconds: 1200.0
  max_retries: 3
  max_steps: 10
  temperature: 0.2
data_dir: data
db_providers:
  books_db:
    enabled: false
    parameters:
      db_path: data/books.db
      timeout: 30.0
    provider_type: sqlite
  default_db:
    enabled: true
    parameters:
      database: postgres
      host: localhost
      password: '1'
      pool_size: 5
      port: 5432
      sslmode: disable
      timeout: 30.0
      username: postgres
    provider_type: postgres
debug: true
llm_providers:
  default_llm:
    enabled: true
    fallback_providers: []
    model_name: qwen-4b
    parameters:
      max_tokens: 512
      model_path: C:\Users\Алексей\Documents\WORK\llm_models\Qwen3\Qwen3-4B-Instruct-2507-F16.gguf
      n_batch: 512
      n_ctx: 20048
      n_gpu_layers: 0
      stop:
      - '"'
      - </s>
      temperature: 0.2
      verbose: false
    provider_type: llama_cpp
    timeout_seconds: 300.0
log_dir: logs/dev
log_level: DEBUG
profile: dev
providers:
  cache:
    enabled: true
    ttl: 300
    type: memory
  monitoring:
    enabled: true
    endpoint: http://localhost:9090
security:
  secrets_path: core/config/defaults/secrets_dev.yaml
  token_expiry_minutes: 60
vector_search:
  chunking:
    chunk_overlap: 50
    chunk_size: 500
    min_chunk_size: 50
  embedding:
    dimension: 384
    model_name: models/embedding/all-MiniLM-L6-v2
  enabled: true
  faiss:
    index_type: Flat
    metric: IP
  indexes:
    books: books_index.faiss
    docs: docs_index.faiss
    history: history_index.faiss
    knowledge: knowledge_index.faiss
  storage:
    base_path: data/vector
version: 5.15.0
