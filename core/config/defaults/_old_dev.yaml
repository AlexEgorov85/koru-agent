# Базовая конфигурация приложения
profile: "dev"
log_level: "DEBUG"
debug_mode: true
data_dir: "./data"


# Переопределение настроек для продакшена
providers:
 # LLM провайдер (vLLM)
  llm:
    provider_type: "llama_cpp"
    model_name: "Qwen3"
    enabled: true
    parameters:
      model_path: "C:\\Qwen3\\Qwen3-4B-Instruct-2507-F16.gguf"
      n_gpu_layers: 0
      n_ctx: 20480
      n_batch: 1024
      temperature: 0.2
      max_tokens: 262100
      verbose: true
      stop: ["<|im_end|>", "<|endoftext|>"]

  # База данных
  database:
    provider_type: "postgres"
    enabled: true
    parameters:
      host: "localhost"
      port: 5432
      database: "postgres"
      username: "postgres"
      password: "${DB_PASSWORD|1}"
      sslmode: "disable"
      timeout: 30.0
      pool_size: 5

# Конфигурация LLM провайдера
llm:
  provider_type: "llama_cpp"
  model_name: "Qwen3"
  enabled: true
  parameters:
    model_path: "C:\\Qwen3\\Qwen3-4B-Instruct-2507-F16.gguf"
    n_gpu_layers: 0
    n_ctx: 20480
    n_batch: 1024
    temperature: 0.2
    max_tokens: 262100
    verbose: true
    stop: ["<|im_end|>", "<|endoftext|>"]

# КОНФИГУРАЦИЯ НАВЫКОВ
skills:
  planning:
    enabled: true
    parameters:
      max_steps: 15
      default_strategy: "react"
  book_library:
    enabled: true
    parameters:
      max_books_per_query: 10
      search_relevance_threshold: 0.6

# КОНФИГУРАЦИЯ ИНСТРУМЕНТОВ
tools:
  SQLTool:
    enabled: true
    parameters:
      max_rows: 1000
      cache_enabled: true

data_dir: "./data/dev"

# Конфигурация агента
agent:
  max_steps: 10
  default_temperature: 0.7
  timeout: 300
  session_ttl: 60
  auto_retry: true
  retry_count: 3
  retry_delay: 1.0
  fallback_enabled: true
  progress_scoring: true

# Дополнительные настройки
logging:
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/agent_system.log"
  rotate: true
  max_size: "10MB"
  backup_count: 5
  console_output: true

monitoring:
  enabled: true
  metrics_port: 8000
  health_check_interval: 30
  prometheus_enabled: false
  tracing_enabled: false

# Безопасность
security:
  input_validation: true
  max_prompt_length: 4096
  rate_limiting:
    enabled: false
    requests_per_minute: 60
  sensitive_data_filtering: true

# Кэширование
cache:
  enabled: true
  type: "memory"
  ttl: 300
  max_size: 1000
  persistence:
    enabled: true
    path: "./data/cache.db"