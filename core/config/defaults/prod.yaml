agent:
  default_strategy: react
  enable_context_window_management: true
  enable_self_reflection: true
  llm_timeout_seconds: 1200.0
  max_retries: 3
  max_steps: 10
  temperature: 0.2
data_dir: data
db_providers:
  default_db:
    enabled: true
    parameters:
      database: postgres
      host: localhost
      password: '1'
      pool_size: 5
      port: 5432
      sslmode: disable
      timeout: 30.0
      username: postgres
    provider_type: postgres
debug: false
llm_providers:
  default_llm:
    enabled: true
    fallback_providers: []
    model_name: nvidia/nemotron-3-super-120b-a12b:free
    parameters:
      api_key: ""  # Используется OPENROUTER_API_KEY из окружения
      temperature: 0.2
      max_tokens: 4096
      timeout_seconds: 120.0
    provider_type: openrouter
    timeout_seconds: 300.0
log_dir: logs/prod
log_level: INFO
profile: prod
providers:
  cache:
    enabled: true
    ttl: 300
    type: memory
  monitoring:
    enabled: true
    endpoint: http://localhost:9090
security:
  secrets_path: null
  token_expiry_minutes: 60
vector_search:
  chunking:
    chunk_overlap: 50
    chunk_size: 500
    min_chunk_size: 50
  embedding:
    dimension: 384
    model_name: models/embedding/all-MiniLM-L6-v2
  enabled: true
  faiss:
    index_type: Flat
    metric: IP
  indexes:
    books: books_index.faiss
    authors: authors_index.faiss
  storage:
    base_path: data/vector
version: 5.15.0
