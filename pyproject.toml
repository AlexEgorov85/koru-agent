[tool.pytest.ini_options]
# Запуск каждого теста 3 раза для выявления флейков
addopts = ["--strict-markers", "--tb=short", "-v"]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
markers = [
    "unit: unit tests",
    "integration: integration tests", 
    "slow: slow tests (skip by default with -m \"not slow\")"
]

[tool.coverage.run]
source = ["."]
omit = [
    "*/tests/*",
    "*/test_*",
    "*/conftest.py",
    "venv/*",
    "env/*",
    ".venv/*"
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:"
]