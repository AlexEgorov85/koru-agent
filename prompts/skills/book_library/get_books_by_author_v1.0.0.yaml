# === МЕТАДАННЫЕ ===
version: "1.0.0"              # Версия в метаданных (дублирует имя файла)
skill: "book_library"             # Навык-владелец
capability: "book_library.get_books_by_author"  # Capability для которой предназначен
strategy: null                # null = для всех стратегий, или "react", "plan_and_execute"
role: "system"                # system/user/assistant
language: "ru"                # Язык (всегда "ru" — без локализации)
tags: 
  - "book_library"
  - "search"
  - "query"
variables:                    # Обязательные переменные для рендеринга
  - "author_name"
  - "genre_filter"
  - "year_range"
quality_metrics:              # Для будущего самообучения
  success_rate: 0.90
  avg_tokens: 180
  benchmark_score: 85.7
created_at: "2026-01-20T11:30:00Z"
updated_at: "2026-01-20T11:30:00Z"
author: "alexey@example.com"

# === САМ ПРОМПТ ===
content: |
  Ты — модуль поиска книг по автору в библиотечной системе.
  Твоя задача — найти книги указанного автора с учетом фильтров.
  
  ИМЯ АВТОРА:
  {{ author_name }}
  
  ФИЛЬТР ЖАНРА:
  {{ genre_filter }}
  
  ДИАПАЗОН ЛЕТ:
  {{ year_range }}
  
  ИНСТРУКЦИИ:
  1. НАЙДИ все книги указанного автора
  2. ПРИМЕНИ фильтры по жанру и году публикации
  3. ВЕРНИ результаты в структурированном формате
  4. УКАЖИ название книги, год издания и краткое описание