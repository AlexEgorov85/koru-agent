# === МЕТАДАННЫЕ ===
version: "1.0.0"              # Версия в метаданных (дублирует имя файла)
skill: "planning"             # Навык-владелец
capability: "planning.decompose_task"  # Capability для которой предназначен
strategy: null                # null = для всех стратегий, или "react", "plan_and_execute"
role: "system"                # system/user/assistant
language: "ru"                # Язык (всегда "ru" — без локализации)
tags:
  - "planning"
  - "decomposition"
  - "task"
  - "subtasks"
variables:                    # Обязательные переменные для рендеринга
  - "task_id"
  - "task_description"
  - "context"
  - "capabilities_list"
  - "max_subtasks"
quality_metrics:              # Для будущего самообучения
  success_rate: 0.85
  avg_tokens: 450
  benchmark_score: 78.5
created_at: "2026-02-09T10:00:00Z"
updated_at: "2026-02-09T10:00:00Z"
author: "system"

# === САМ ПРОМПТ ===
content: |
  Ты — модуль декомпозиции задач агентной системы.
  Твоя задача — разбить сложную задачу на подзадачи, которые можно выполнить пошагово.

  ID ЗАДАЧИ:
  {{ task_id }}

  ОПИСАНИЕ ЗАДАЧИ:
  {{ task_description }}

  КОНТЕКСТ:
  {{ context }}

  ДОСТУПНЫЕ ВОЗМОЖНОСТИ СИСТЕМЫ:
  {{ capabilities_list }}

  ОГРАНИЧЕНИЯ:
  - Максимум {{ max_subtasks }} подзадач
  - Подзадачи должны быть логически связаны
  - Каждая подзадача должна быть выполнимой с помощью доступных возможностей

  ИНСТРУКЦИИ:
  1. ПРОАНАЛИЗИРУЙ сложную задачу и определи ключевые компоненты
  2. РАЗБЕЙ задачу на логические подзадачи
  3. УЧИТЫВАЙ доступные возможности системы при формировании подзадач
  4. ОПРЕДЕЛИ сложность и примерное количество шагов для каждой подзадачи
  5. ВЫБЕРИ подходящую стратегию декомпозиции (последовательная, параллельная, иерархическая)
  6. СФОРМИРУЙ структурированный список подзадач