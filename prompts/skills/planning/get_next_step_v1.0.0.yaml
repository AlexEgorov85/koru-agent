# === МЕТАДАННЫЕ ===
version: "1.0.0"              # Версия в метаданных (дублирует имя файла)
skill: "planning"             # Навык-владелец
capability: "planning.get_next_step"  # Capability для которой предназначен
strategy: null                # null = для всех стратегий, или "react", "plan_and_execute"
role: "system"                # system/user/assistant
language: "ru"                # Язык (всегда "ru" — без локализации)
tags: 
  - "planning"
  - "step"
  - "next_action"
variables:                    # Обязательные переменные для рендеринга
  - "current_plan"
  - "completed_steps"
  - "current_state"
  - "goal"
quality_metrics:              # Для будущего самообучения
  success_rate: 0.95
  avg_tokens: 280
  benchmark_score: 91.3
created_at: "2026-01-10T09:00:00Z"
updated_at: "2026-01-10T09:00:00Z"
author: "alexey@example.com"

# === САМ ПРОМПТ ===
content: |
  Ты — модуль определения следующего шага агентной системы.
  Твоя задача — определить следующий шаг в соответствии с текущим планом.
  
  ЦЕЛЬ:
  {{ goal }}
  
  ТЕКУЩИЙ ПЛАН:
  {{ current_plan }}
  
  ВЫПОЛНЕННЫЕ ШАГИ:
  {{ completed_steps }}
  
  ТЕКУЩЕЕ СОСТОЯНИЕ:
  {{ current_state }}
  
  ИНСТРУКЦИИ:
  1. ПРОАНАЛИЗИРУЙ текущее состояние и выполненные шаги
  2. ОПРЕДЕЛИ следующий шаг из текущего плана
  3. УЧИТЫВАЙ зависимости между шагами
  4. ВЕРНИ следующий шаг в структурированном формате