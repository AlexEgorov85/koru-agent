version: "1.0.0"
contract_type: "input"
skill: "sql_query"
capability: "sql_query.execute"
schema:
  type: "object"
  required:
    - "user_question"
    - "tables"
  properties:
    user_question:
      type: "string"
      description: "Вопрос пользователя"
    tables:
      type: "array"
      items:
        type: "string"
      description: "Таблицы для запроса"
    max_rows:
      type: "integer"
      description: "Максимальное количество строк"
      default: 50
    context:
      type: "string"
      description: "Контекст выполнения"
      nullable: true