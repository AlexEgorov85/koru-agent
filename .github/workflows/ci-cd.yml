name: CI/CD Pipeline

on:
  push:
    branches: [agentv5, main, master]
  pull_request:
    branches: [agentv5, main, master]

# Отменяем предыдущие запуски при новом пуше
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests & Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          echo "🔍 Running flake8 linting..."
          flake8 core/ tests/ scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 core/ tests/ scripts/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check formatting with black
        run: |
          echo "📝 Checking code formatting..."
          black --check core/ tests/ scripts/

      - name: Run unit tests with coverage
        run: |
          echo "🧪 Running unit tests..."
          pytest tests/unit/ -v --tb=short \
            --cov=core \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-report=html \
            --junitxml=pytest-unit-results.xml

      - name: Run integration tests
        run: |
          echo "🔗 Running integration tests..."
          pytest tests/integration/ -v --tb=short -m "not e2e" \
            --cov=core \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-append \
            --junitxml=pytest-integration-results.xml

      - name: Run E2E tests (non-destructive)
        run: |
          echo "🚀 Running E2E tests..."
          pytest tests/e2e/ -v --tb=short -m "not real_llm" \
            --junitxml=pytest-e2e-results.xml \
            --maxfail=3
        timeout-minutes: 30

      - name: Check coverage threshold
        run: |
          echo "📊 Checking coverage threshold..."
          coverage xml
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          lines_valid = int(root.get('lines-valid'))
          lines_covered = int(root.get('lines-covered'))
          coverage_pct = (lines_covered / lines_valid * 100) if lines_valid > 0 else 0
          print(f'Coverage: {coverage_pct:.1f}%')
          if coverage_pct < 80:
              print('❌ Coverage below 80% threshold!')
              exit(1)
          else:
              print('✅ Coverage above 80% threshold!')
          "

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        if: success()

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
        if: always()

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            pytest-*.xml

  security:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install safety
        run: pip install safety

      - name: Check dependencies for vulnerabilities
        run: |
          echo "🔒 Checking dependencies for vulnerabilities..."
          safety check -r requirements.txt -r requirements-dev.txt --ignore 70612

  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Validate documentation links
        run: |
          echo "📖 Validating documentation links..."
          python scripts/maintenance/validate_docs.py || echo "Documentation validation completed"

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml packaging

      - name: Check version consistency
        run: |
          echo "🏷️ Checking version consistency..."
          python scripts/versioning/validate_consistency.py || echo "Version check completed"

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test]
    if: always()

    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results

      - name: Generate test summary
        run: |
          echo "📊 Test Summary"
          echo "=============="
          echo ""
          for file in pytest-*.xml; do
            if [ -f "$file" ]; then
              echo "📁 $file:"
              tests=$(grep -o 'tests="[0-9]*"' "$file" | head -1 | grep -o '[0-9]*')
              failures=$(grep -o 'failures="[0-9]*"' "$file" | head -1 | grep -o '[0-9]*')
              errors=$(grep -o 'errors="[0-9]*"' "$file" | head -1 | grep -o '[0-9]*')
              echo "   Tests: $tests, Failures: $failures, Errors: $errors"
            fi
          done
