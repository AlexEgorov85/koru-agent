# ============================================================================
# ДАШБОРД МЕТРИК НАВЫКА BOOK_LIBRARY
# ============================================================================
# Версия: v1.0.0
# Дата создания: 2026-02-17
# Описание: Метрики для мониторинга производительности и качества работы навыка
# ============================================================================

dashboard:
  name: book_library_metrics
  title: "Метрики навыка Book Library"
  description: "Мониторинг производительности и качества работы навыка библиотеки книг"
  version: v1.0.0
  refresh_interval_seconds: 60

# ============================================================================
# МЕТРИКИ
# ============================================================================

metrics:
  # -------------------------------------------------------------------------
  # Счётчики (Counters)
  # -------------------------------------------------------------------------
  - name: book_library.total_executions
    type: counter
    description: "Общее количество выполнений навыка"
    labels:
      - execution_type  # static | dynamic
      - capability      # book_library.search_books | book_library.execute_script
      - status          # success | failed
    unit: executions

  - name: book_library.static_script_executions
    type: counter
    description: "Количество выполнений заготовленных скриптов"
    labels:
      - script_name     # get_all_books | get_books_by_author | ...
      - status          # success | failed
    unit: executions

  - name: book_library.dynamic_search_executions
    type: counter
    description: "Количество динамических поисков через LLM"
    labels:
      - status          # success | failed
      - llm_provider    # default_llm | ...
    unit: executions

  - name: book_library.script_not_found_count
    type: counter
    description: "Количество запросов несуществующих скриптов"
    labels:
      - script_name     # имя запрошенного скрипта
    unit: occurrences

  - name: book_library.validation_errors
    type: counter
    description: "Количество ошибок валидации параметров"
    labels:
      - capability
      - error_type      # missing_parameter | invalid_type | contract_violation
    unit: errors

  # -------------------------------------------------------------------------
  # Измерители (Gauges)
  # -------------------------------------------------------------------------
  - name: book_library.avg_execution_time_ms
    type: gauge
    description: "Среднее время выполнения запроса (мс)"
    labels:
      - execution_type  # static | dynamic
      - percentile      # p50 | p90 | p99
    unit: milliseconds

  - name: book_library.error_rate
    type: gauge
    description: "Процент ошибок выполнения"
    labels:
      - execution_type  # static | dynamic
      - time_window     # 1m | 5m | 15m
    unit: percent

  - name: book_library.success_rate
    type: gauge
    description: "Процент успешных выполнений"
    labels:
      - execution_type  # static | dynamic
      - time_window     # 1m | 5m | 15m
    unit: percent

  - name: book_library.llm_latency_ms
    type: gauge
    description: "Задержка LLM вызова для динамического поиска (мс)"
    labels:
      - llm_provider
      - percentile      # p50 | p90 | p99
    unit: milliseconds

  - name: book_library.sql_generation_latency_ms
    type: gauge
    description: "Время генерации SQL запроса (мс)"
    labels:
      - percentile      # p50 | p90 | p99
    unit: milliseconds

  - name: book_library.db_query_latency_ms
    type: gauge
    description: "Время выполнения SQL запроса в БД (мс)"
    labels:
      - execution_type  # static | dynamic
      - percentile      # p50 | p90 | p99
    unit: milliseconds

  - name: book_library.active_sessions
    type: gauge
    description: "Количество активных сессий с использованием book_library"
    labels: []
    unit: sessions

  - name: book_library.cache_hit_rate
    type: gauge
    description: "Процент попаданий в кэш промптов и контрактов"
    labels:
      - cache_type      # prompts | contracts | scripts
    unit: percent

  # -------------------------------------------------------------------------
  # Гистограммы (Histograms)
  # -------------------------------------------------------------------------
  - name: book_library.execution_time_distribution
    type: histogram
    description: "Распределение времени выполнения запросов"
    labels:
      - execution_type  # static | dynamic
      - script_name     # для static
    buckets:
      - 10      # 10 мс
      - 50      # 50 мс
      - 100     # 100 мс
      - 250     # 250 мс
      - 500     # 500 мс
      - 1000    # 1 с
      - 2000    # 2 с
      - 5000    # 5 с
      - 10000   # 10 с
    unit: milliseconds

  - name: book_library.result_size_distribution
    type: histogram
    description: "Распределение размера результатов (количество строк)"
    labels:
      - execution_type  # static | dynamic
    buckets:
      - 1
      - 5
      - 10
      - 20
      - 50
      - 100
      - 500
      - 1000
    unit: rows

# ============================================================================
# ПАНЕЛИ ДАШБОРДА
# ============================================================================

panels:
  - title: "Общая статистика"
    type: summary
    metrics:
      - book_library.total_executions
      - book_library.success_rate
      - book_library.error_rate
      - book_library.avg_execution_time_ms

  - title: "Static vs Dynamic"
    type: comparison
    metrics:
      - name: book_library.static_script_executions
        label: "Static скрипты"
      - name: book_library.dynamic_search_executions
        label: "Dynamic поиск"

  - title: "Производительность"
    type: time_series
    metrics:
      - book_library.avg_execution_time_ms
      - book_library.db_query_latency_ms
      - book_library.llm_latency_ms

  - title: "Ошибки"
    type: time_series
    metrics:
      - book_library.error_rate
      - book_library.validation_errors
      - book_library.script_not_found_count

  - title: "Топ скриптов"
    type: table
    metrics:
      - book_library.static_script_executions
    group_by: script_name
    order_by: executions DESC
    limit: 10

# ============================================================================
# АГРЕГАЦИЯ И ХРАНЕНИЕ
# ============================================================================

aggregation:
  default_window: 5m
  windows:
    - 1m
    - 5m
    - 15m
    - 1h
    - 24h

storage:
  backend: prometheus  # или influxdb, graphite
  retention:
    raw: 7d
    aggregated: 30d
