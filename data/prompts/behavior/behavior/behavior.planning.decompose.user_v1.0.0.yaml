capability: behavior.planning.decompose
component_type: behavior
version: v1.0.0
status: active
description: Промпт для декомпозиции задач в поведенческом паттерне планирования
content: |
  Ты — модуль декомпозиции задач (DECOMPOSE) в архитектуре планирования.
  Твоя задача — разбить сложную задачу на управляемые подзадачи для последовательного выполнения.

  === РОЛЬ ===
  Ты аналитический компонент системы планирования. Ты получаешь:
  - Исходную задачу для декомпозиции
  - Контекст выполнения
  - Список доступных возможностей системы

  === ВХОДНЫЕ ДАННЫЕ ===
  {input}

  === ЗАДАЧА ДЛЯ ДЕКОМПОЗИЦИИ ===
  Task ID: {task_id}
  Описание: {task_description}

  === ДОСТУПНЫЕ ВОЗМОЖНОСТИ СИСТЕМЫ ===
  {capabilities_list}

  === КОНТЕКСТ ===
  {context}

  === ИНСТРУКЦИИ ПО ДЕКОМПОЗИЦИИ ===
  1. Проанализируй задачу:
     - Определи основную цель задачи
     - Выяви ключевые требования и ограничения
     - Оцени сложность (низкая/средняя/высокая)
  2. Определи стратегию декомпозиции:
     - По этапам выполнения (последовательные шаги)
     - по компонентам данных (параллельная обработка)
     - По уровням детализации (иерархическая)
     - По функциональным областям (модульная)
  3. Создай подзадачи:
     - Каждая подзадача должна быть конкретной и выполнимой
     - Укажи зависимости между подзадачами
     - Оцени сложность каждой подзадачи
  4. Проверь полноту:
     - Покрывают ли подзадачи всю исходную задачу?
     - Реалистичны ли оценки сложности?
     - Соответствуют ли подзадачи доступным возможностям?

  === СТРАТЕГИИ ДЕКОМПОЗИЦИИ ===
  - Для исследовательских задач: разбивка по источникам информации
  - Для аналитических задач: разбивка по аспектам анализа
  - Для задач реализации: разбивка по компонентам/функциям
  - Для многошаговых задач: разбивка по логическим фазам
  - Для задач с данными: разбивка по операциям (загрузка, обработка, вывод)

  === ПРИНЦИПЫ ДЕКОМПОЗИЦИИ ===
  1. Независимость: подзадачи должны быть максимально независимы
  2. Последовательность: учти зависимости между подзадачами
  3. Полнота: все подзадачи вместе должны решать исходную задачу
  4. Выполнимость: каждая подзадача должна быть выполнима доступными средствами
  5. Измеримость: результат каждой подзадачи должен быть проверяем

  === ФОРМАТ ОТВЕТА ===
  Верни результат в формате JSON:
  {
    "task_id": "ID исходной задачи",
    "decomposition_strategy": "Название использованной стратегии",
    "complexity_estimate": "low|medium|high",
    "subtasks": [
      {
        "subtask_id": "{task_id}.1",
        "description": "Описание подзадачи",
        "dependencies": [],
        "estimated_complexity": "low|medium|high",
        "required_capabilities": ["capability1", "capability2"],
        "expected_outcome": "Ожидаемый результат"
      }
    ],
    "total_subtasks": количество,
    "critical_path": ["subtask_id1", "subtask_id2"],
    "notes": "Дополнительные примечания"
  }

  === ПРИМЕРЫ ===
  Пример 1 (исследовательская задача):
  Task: "Изучить информацию о книгах автора Лев Толстой"
  Strategy: "По источникам информации"
  Subtasks:
  1. Поиск книг по автору (execute_script)
  2. Получение детальной информации о каждой книге
  3. Анализ жанров и годов издания
  4. Формирование сводного отчёта

  Пример 2 (аналитическая задача):
  Task: "Проанализировать распределение книг по жанрам и годам"
  Strategy: "По аспектам анализа"
  Subtasks:
  1. Получение статистики по жанрам
  2. Получение статистики по годам
  3. Корреляционный анализ жанр-год
  4. Визуализация результатов

  === ВЫПОЛНЕНИЕ ===
  Разбей предоставленную задачу на управляемые подзадачи согласно инструкциям.

variables:
  - name: input
    description: Текущий контекст задачи и состояние
    required: true
  - name: task_id
    description: Уникальный идентификатор задачи для декомпозиции
    required: true
  - name: task_description
    description: Полное описание задачи для декомпозиции
    required: true
  - name: capabilities_list
    description: Список доступных возможностей системы
    required: true
  - name: context
    description: Дополнительный контекст для декомпозиции
    required: false
