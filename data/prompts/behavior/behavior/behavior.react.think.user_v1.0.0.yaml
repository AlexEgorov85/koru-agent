capability: behavior.react.think.user
component_type: behavior
version: v1.0.0
status: active
description: User prompt для рассуждения в цикле ReAct
content: |
  === КОНТЕКСТ ===
  {input}
  {dialogue_history}
  Цель: {goal}
  История: {step_history}

  === ИНСТРУМЕНТЫ ===
  {available_tools}

  === СТРУКТУРА ОТВЕТА ===
  Верни объект со следующими полями:
  - thought: строка, твоё рассуждение о ситуации
  - analysis: объект с полями:
    - progress: строка, описание прогресса к цели
    - current_state: строка, текущее состояние задачи
    - issues: массив строк, список проблем
  - decision: объект с полями:
    - next_action: строка, название следующего действия (capability_name)
    - reasoning: строка, обоснование выбора
    - parameters: объект, параметры для действия
    - expected_outcome: строка, ожидаемый результат
  - confidence: число от 0.0 до 1.0, уверенность в решении
  - stop_condition: true если задача завершена, false если есть ещё шаги

  === ПРАВИЛА ВЫБОРА ИНСТРУМЕНТА ===
  КЛЮЧЕВОЕ ПРАВИЛО: Если запрос можно выполнить готовым скриптом — используй book_library.execute_script!

  1. book_library.execute_script — для ПРОСТЫХ запросов:
     - "книги Гоголя / Пушкина / Толстого" → get_books_by_author
     - "книги в жанре фантастика" → get_books_by_genre
     - "книги со словом 'Война' в названии" → get_books_by_title_pattern
     - "показать все книги" → get_all_books
     - "найти книгу с ID 5" → get_book_by_id
     - "сколько книг у Толстого" → count_books_by_author

  2. book_library.search_books — ТОЛЬКО для СЛОЖНЫХ запросов:
     - "книги после 1850 года" (один год, нет готового скрипта)
     - "книги где action происходит на Украине" (сюжетный критерий)
     - "книги авторов старше 50 лет" (вычисляемое условие)
     - Запросы НЕ покрываемые готовыми скриптами

  3. final_answer.generate — когда данные уже получены и нужно сформировать ответ пользователю

  === ЗАДАНИЕ ===
  Проанализируй контекст и верни решение согласно описанной структуре выше.
  ВАЖНО: Если данные уже получены в истории — используй final_answer.generate и установи stop_condition=true.
variables:
  - name: input
    description: Текущий контекст задачи и состояние
    required: true
  - name: dialogue_history
    description: История предыдущих диалогов (вопросы и ответы)
    required: false
  - name: goal
    description: Исходная цель задачи
    required: true
  - name: step_history
    description: История выполненных шагов с результатами
    required: false
  - name: available_tools
    description: Список доступных инструментов с описаниями и параметрами
    required: false
metadata:
  author: system
  created: '2026-02-19'
  description: User prompt для behavior.react.think с примерами форматов
  version_notes: 'Добавлена переменная {dialogue_history} для сохранения контекста между запросами'
