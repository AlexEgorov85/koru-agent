capability: behavior.react.think.user
component_type: behavior
version: v1.0.0
status: active
description: User prompt для рассуждения в цикле ReAct
content: |
  === КОНТЕКСТ ===
  {input}
  Цель: {goal}
  История: {step_history}
  Наблюдение: {observation}

  === ИНСТРУМЕНТЫ ===
  {available_tools}

  === ЗАДАНИЕ ===
  Сформируй план действий для достижения цели.
  Верни ТОЛЬКО один JSON объект согласно схеме из системного промпта.
  
  Начни свой ответ с открывающей фигурной скобки {{ и закончи закрывающей }}.
variables:
  - name: input
    description: Текущий контекст задачи и состояние
    required: true
  - name: goal
    description: Исходная цель задачи
    required: true
  - name: step_history
    description: История выполненных шагов с результатами
    required: false
  - name: observation
    description: Результат последнего наблюдения
    required: false
  - name: available_tools
    description: Список доступных инструментов с описаниями
    required: false
metadata:
  author: system
  created: '2026-02-19'
  description: User prompt для behavior.react.think
  version_notes: 'Убран пример JSON чтобы модель не повторяла шаблон'
