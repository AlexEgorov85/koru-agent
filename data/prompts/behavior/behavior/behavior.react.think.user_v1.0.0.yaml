capability: behavior.react.think.user
component_type: behavior
version: v1.0.0
status: active
description: User prompt для рассуждения в цикле ReAct
content: |
  === КОНТЕКСТ ===
  {input}
  {dialogue_history}
  Цель: {goal}
  История: {step_history}

  === ИНСТРУМЕНТЫ ===
  {available_tools}

  === ПРАВИЛА ВЫБОРА ИНСТРУМЕНТА ===
  Выбирай инструмент на основе доступности и контекста задачи.

  1. check_result.execute_script — для ПРОСТЫХ запросов к БД:
     - "открытые отклонения" → get_violations_by_status (параметр status='Открыто')
     - "проверки в работе" → get_audit_by_status (параметр status='В работе')
     - "просроченные отклонения" → get_overdue_violations
     - "отклонения по проверке N" → get_violations_by_audit (параметр audit_id=N)
     - "статистика проверок" → get_audit_statistics

  2. check_result.generate_script — для СЛОЖНЫХ запросов:
     - запросы НЕ покрываемые готовыми скриптами
     - требуется генерация SQL через LLM

  3. final_answer.generate — когда данные получены и нужно сформировать ответ
variables:
  - name: input
    description: Текущий контекст задачи и состояние
    required: true
  - name: dialogue_history
    description: История предыдущих диалогов (вопросы и ответы)
    required: false
  - name: goal
    description: Исходная цель задачи
    required: true
  - name: step_history
    description: История выполненных шагов с результатами
    required: false
  - name: available_tools
    description: Список доступных инструментов с описаниями и параметрами
    required: false
metadata:
  author: system
  created: '2026-02-19'
  description: User prompt для behavior.react.think с примерами форматов
  version_notes: 'Добавлена переменная {dialogue_history} для сохранения контекста между запросами'
