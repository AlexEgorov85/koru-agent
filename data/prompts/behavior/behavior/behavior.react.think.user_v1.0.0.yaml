capability: behavior.react.think.user
component_type: behavior
version: v1.0.0
status: active
description: User prompt для рассуждения в цикле ReAct
content: |
  === КОНТЕКСТ ===
  {input}
  {dialogue_history}
  Цель: {goal}
  История: {step_history}

  === ИНСТРУМЕНТЫ ===
  {available_tools}

  === ПРИМЕР 1: ГОТОВЫЙ СКРИПТ (запрос по автору) ===
  Входной запрос: "Книги написанные Пушкиным"
  {
    "thought": "Пользователь спрашивает про книги Пушкина. Это простой запрос по автору - есть готовый скрипт get_books_by_author.",
    "analysis": {
      "progress": "Начало выполнения, шагов не сделано",
      "current_state": "Требуется поиск книг по автору 'Пушкин'",
      "issues": []
    },
    "decision": {
      "next_action": "book_library.execute_script",
      "reasoning": "Запрос по автору - используем готовый скрипт get_books_by_author",
      "parameters": {
        "script_name": "get_books_by_author",
        "author": "Пушкин",
        "max_rows": 20
      },
      "expected_outcome": "Список книг Пушкина"
    },
    "confidence": 0.95,
    "stop_condition": false
  }

  === ПРИМЕР 2: ДИНАМИЧЕСКАЯ ГЕНЕРАЦИЯ SQL (сложный запрос с годами) ===
  Входной запрос: "Книги написанные после 1850 года"
  {
    "thought": "Запрос 'книги после 1850 года' - это запрос по условию на год. Готового скрипта для одиночного года нет, нужен динамический SQL.",
    "analysis": {
      "progress": "Начало выполнения, шагов не сделано",
      "current_state": "Требуется поиск книг по условию 'после 1850 года'",
      "issues": ["Нет готового скрипта для одиночного года - нужен динамический SQL"]
    },
    "decision": {
      "next_action": "book_library.search_books",
      "reasoning": "Сложный запрос по году - генерируем SQL динамически",
      "parameters": {
        "query": "Найти все книги после 1850 года",
        "max_results": 20
      },
      "expected_outcome": "Список книг изданных после 1850 года"
    },
    "confidence": 0.85,
    "stop_condition": false
  }

  === ПРИМЕР 3: ДАННЫЕ ПОЛУЧЕНЫ — формируем ответ ===
  {
    "thought": "Данные получены: найдено 5 книг Пушкина. Задача выполнена.",
    "analysis": {
      "progress": "Данные собраны, задача решена",
      "current_state": "Требуется сформировать финальный ответ",
      "issues": []
    },
    "decision": {
      "next_action": "final_answer.generate",
      "reasoning": "Данные получены, нужно сформировать финальный ответ пользователю",
      "parameters": {
        "include_steps": true,
        "include_evidence": true,
        "format_type": "list"
      },
      "expected_outcome": "Финальный ответ в виде списка книг Пушкина"
    },
    "confidence": 0.95,
    "stop_condition": true
  }

  === ПРАВИЛА ВЫБОРА ИНСТРУМЕНТА ===
  КЛЮЧЕВОЕ ПРАВИЛО: Если запрос можно выполнить готовым скриптом - используй execute_script!
  
  1. book_library.execute_script — для ПРОСТЫХ запросов:
     - "книги Гоголя / Пушкина / Толстого" → get_books_by_author
     - "книги в жанре фантастика" → get_books_by_genre
     - "книги со словом 'Война' в названии" → get_books_by_title_pattern
     - "показать все книги" → get_all_books
     - "найти книгу с ID 5" → get_book_by_id
     - "сколько книг у Толстого" → count_books_by_author
  
  2. book_library.search_books — ТОЛЬКО для СЛОЖНЫХ запросов:
     - "книги после 1850 года" (один год, нет готового скрипта)
     - "книги где action происходит на Украине" (сюжетный критерий)
     - "книги авторов старше 50 лет" (вычисляемое условие)
     - Запросы НЕ покрываемые готовыми скриптами

  === ЗАДАНИЕ ===
  Верни ТОЛЬКО один JSON объект в формате из примера выше.
  Начни с { и закончи }.
  ВАЖНО: Если данные уже получены в истории — используй ПРИМЕР 3 (final_answer.generate + stop_condition=true).
variables:
  - name: input
    description: Текущий контекст задачи и состояние
    required: true
  - name: dialogue_history
    description: История предыдущих диалогов (вопросы и ответы)
    required: false
  - name: goal
    description: Исходная цель задачи
    required: true
  - name: step_history
    description: История выполненных шагов с результатами
    required: false
  - name: available_tools
    description: Список доступных инструментов с описаниями и параметрами
    required: false
metadata:
  author: system
  created: '2026-02-19'
  description: User prompt для behavior.react.think с примерами форматов
  version_notes: 'Добавлена переменная {dialogue_history} для сохранения контекста между запросами'
