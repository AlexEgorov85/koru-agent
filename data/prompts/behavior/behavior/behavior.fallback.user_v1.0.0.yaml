  ## Текущее состояние
  
  goal: {goal}
  error_reason: {error_reason}
  context_summary: {context_summary}
  
  ## Инструкции
  
  Верни ответ в формате JSON:
  {
    "error_type": "pattern_failure",
    "reason": "описание ошибки",
    "can_retry": false,
    "recommended_action": "описание рекомендуемого действия"
  }
variables:
  - name: goal
    description: Цель текущего сессии
    required: true
  - name: error_reason
    description: Причина ошибки
    required: true
  - name: context_summary
    description: Сводка контекста выполнения
    required: false
metadata:
  author: system
