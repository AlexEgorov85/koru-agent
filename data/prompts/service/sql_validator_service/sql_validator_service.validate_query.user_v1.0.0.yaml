capability: sql_validator_service.validate_query
version: v1.0.0
status: active
component_type: service
prompt_type: user
description: >
  Пользовательский промпт для сервиса валидации SQL-запросов.
variables:
  - name: sql
    type: string
    description: SQL-запрос для валидации
  - name: parameters
    type: object
    description: Параметры запроса
content: |
  Проверь следующий SQL-запрос на безопасность и корректность:
  
  SQL: {sql}
  Параметры: {parameters}
  
  Требования:
  1. Разрешены только SELECT запросы
  2. Запрещена конкатенация пользовательских данных
  3. Все идентификаторы должны быть валидированы
  4. Параметры должны соответствовать плейсхолдерам
  
  Верни результат валидации.
