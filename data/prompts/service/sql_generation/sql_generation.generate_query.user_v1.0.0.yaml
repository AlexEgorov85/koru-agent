capability: sql_generation.generate_query
component_type: service
version: v1.0.0
status: active
description: Генерация SQL запроса из естественного языка
content: |
  {natural_language_request}

  Используя схему базы данных:

  {table_schema}

  Верни объект со следующими полями:
  - generated_sql: сгенерированный SQL-запрос
  - confidence_score: уверенность в запросе (0.0-1.0)
  - explanation: объяснение запроса
  - potential_issues: потенциальные проблемы (массив строк)
variables:
  - name: natural_language_request
    description: Запрос на естественном языке
    required: true
  - name: table_schema
    description: Схема базы данных
    required: true
metadata:
  author: system
  created: '2026-02-15'
  description: Prompt for sql_generation.generate_query
