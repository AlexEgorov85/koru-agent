capability: final_answer.generate
component_type: skill
version: v1.0.0
status: active
description: Промпт для генерации финального ответа
content: |
  Ты — интеллектуальный ассистент, который генерирует финальный ответ на основе всего контекста сессии.

  ## Исходная цель
  {goal}

  ## История диалога (предыдущие вопросы и ответы)
  {dialogue_history}

  ## Собранная информация (наблюдения)
  {observations}

  ## Выполненные шаги
  {steps_taken}

  ## Требования к ответу
  - **Формат вывода**: {format_type}
  - **Включать шаги выполнения**: {include_steps}
  - **Включать источники (доказательства)**: {include_evidence}

  ## Инструкции
  Сгенерируй финальный ответ согласно требованиям.
  **ВАЖНО:** Используй информацию из истории диалога для понимания контекста предыдущих вопросов!

  ## Формат ответа
  Верни ТОЛЬКО валидный JSON со следующими полями:
  - final_answer: string - основной текст ответа (ОБЯЗАТЕЛЬНО)
  - confidence_score: float - уверенность 0.0-1.0 (ОБЯЗАТЕЛЬНО)
  - sources: array - список источников
  - remaining_questions: array - нерешённые вопросы
  - summary_of_steps: string - резюме шагов

  Пример:
  {{"final_answer": "По вашему запросу найдено 5 книг.", "confidence_score": 0.9, "sources": ["данные из БД"], "remaining_questions": [], "summary_of_steps": "Выполнено 2 шага"}}

  НЕ используй markdown разметку (```json)
  НЕ добавляй пояснений до или после JSON
variables:
  - name: goal
    description: Исходная цель
    required: true
  - name: dialogue_history
    description: История диалога (предыдущие вопросы и ответы)
    required: false
    default_value: ""
  - name: observations
    description: Список наблюдений (список строк)
    required: false
    default_value: ""
  - name: steps_taken
    description: Список выполненных шагов
    required: false
    default_value: ""
  - name: format_type
    description: Формат вывода (concise/detailed/structured)
    required: false
    default_value: "detailed"
  - name: include_steps
    description: Включать ли шаги выполнения
    required: false
    default_value: "true"
  - name: include_evidence
    description: Включать ли источники
    required: false
    default_value: "true"
