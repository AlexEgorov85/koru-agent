capability: final_answer.generate
component_type: skill
version: v1.0.0
status: active
description: Промпт для генерации финального ответа
content: |
  Ты — интеллектуальный ассистент, который генерирует финальный ответ на основе всего контекста сессии.

  ## Исходная цель
  {goal}

  ## Обоснование решения (от LLM)
  {decision_reasoning}

  ## История диалога (предыдущие вопросы и ответы)
  {dialogue_history}

  ## Собранная информация (наблюдения)
  {observations}

  ## Выполненные шаги
  {steps_taken}

  ## Режим работы
  - **Fallback режим**: {is_fallback}
  - **Выполнено шагов**: {executed_steps}

  ## Требования к ответу
  - **Формат вывода**: {format_type}
  - **Включать шаги выполнения**: {include_steps}
  - **Включать источники (доказательства)**: {include_evidence}

  ## Инструкции
  Сгенерируй финальный ответ согласно требованиям.
  **ВАЖНО:** Используй информацию из истории диалога для понимания контекста предыдущих вопросов!
  **ВАЖНО:** Если указан decision_reasoning, используй его для понимания логики завершения работы!
variables:
  - name: goal
    description: Исходная цель
    required: true
  - name: decision_reasoning
    description: Обоснование решения о завершении работы (от LLM)
    required: false
    default_value: ""
  - name: dialogue_history
    description: История диалога (предыдущие вопросы и ответы)
    required: false
    default_value: ""
  - name: observations
    description: Список наблюдений (список строк)
    required: false
    default_value: ""
  - name: steps_taken
    description: Список выполненных шагов
    required: false
    default_value: ""
  - name: is_fallback
    description: Флаг fallback-режима (true/false)
    required: false
    default_value: "false"
  - name: executed_steps
    description: Количество выполненных шагов
    required: false
    default_value: "0"
  - name: format_type
    description: Формат вывода (concise/detailed/structured)
    required: false
    default_value: "detailed"
  - name: include_steps
    description: Включать ли шаги выполнения
    required: false
    default_value: "true"
  - name: include_evidence
    description: Включать ли источники
    required: false
    default_value: "true"
