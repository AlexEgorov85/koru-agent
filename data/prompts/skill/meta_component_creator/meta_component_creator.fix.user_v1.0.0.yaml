capability: meta_component_creator.fix
component_type: skill
version: v1.0.0
status: active
description: User промпт для исправления компонента
content: |
  Исправь компонент '{component_name}' (тип: {component_type}).

  Описание проблемы:
  {issue_description}

  Ниже представлены оригинальные файлы компонента. Проанализируй их и верни исправленные версии.

  {original_files}

  Верни только исправленные файлы с кратким описанием изменений.
variables:
  - name: component_name
    description: Имя компонента для исправления
    required: true
  - name: component_type
    description: Тип компонента (skill/tool/service/behavior)
    required: false
    default_value: "skill"
  - name: issue_description
    description: Описание проблемы
    required: true
  - name: original_files
    description: Содержимое оригинальных файлов
    required: false
    default_value: ""
metadata:
  author: system
  created: '2026-04-03'
  description: User промпт для meta_component_creator.fix
