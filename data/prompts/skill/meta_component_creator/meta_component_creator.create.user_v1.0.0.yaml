capability: meta_component_creator.create
component_type: skill
version: v1.0.0
status: active
description: User промпт для создания нового компонента
content: |
  Создай новый компонент для koru-agent по следующему описанию:

  {description}

  Тип компонента: {component_type}

  {capabilities_hint}
  {dependencies_hint}

  Сгенерируй полный набор файлов:
  1. Основной Python-файл (skill.py / {name}_tool.py / service.py / pattern.py)
  2. Промпты (system и user) для каждой capability (если нужны)
  3. Контракты (input и output) для каждой capability (если нужны)

  Следуй архитектурным правилам из системного промпта.
variables:
  - name: description
    description: Подробное описание логики компонента
    required: true
  - name: component_type
    description: Тип компонента (skill/tool/service/behavior)
    required: false
    default_value: "skill"
  - name: capabilities_hint
    description: Подсказка о требуемых capabilities
    required: false
    default_value: ""
  - name: dependencies_hint
    description: Подсказка о зависимостях
    required: false
    default_value: ""
  - name: name
    description: Имя компонента
    required: false
    default_value: "component"
metadata:
  author: system
  created: '2026-04-03'
  description: User промпт для meta_component_creator.create
