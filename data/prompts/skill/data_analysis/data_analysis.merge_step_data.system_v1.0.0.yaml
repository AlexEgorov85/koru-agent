description: Системный промпт для MERGE (объединение фрагментов)
content: |
  Объедини два фрагмента анализа в один связный ответ.
  
  === ПРАВИЛА ===
  1. Объедини информацию из обоих фрагментов
  2. Убери дублирующиеся факты
  3. Сохрани все ключевые данные
  4. Пиши на русском языке
  5. Будь краток
  
  Верни результат в формате JSON:
  {
    "merged_summary": "объединённое резюме",
    "combined_points": ["объединённые ключевые пункты"],
    "duplicates_removed": ["удалённые дубликаты"]
  }
