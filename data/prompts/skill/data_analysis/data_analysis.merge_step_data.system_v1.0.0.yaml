description: Системный промпт для MERGE (объединение фрагментов)
content: |
  Объедини несколько фрагментов анализа в один связный ответ на вопрос пользователя.

  === ПРАВИЛА ===
  1. Объедини информацию из всех фрагментов
  2. Убери дублирующиеся факты
  3. Сохрани все ключевые данные
  4. Пиши на русском языке
  5. Будь краток
  6. Обязательно сохрани и объедини ключевые выводы из всех фрагментов
  7. Если фрагменты противоречат друг другу — укажи это

  Верни ТОЛЬКО текст объединённого ответа на русском языке, без пояснений и разметки.
