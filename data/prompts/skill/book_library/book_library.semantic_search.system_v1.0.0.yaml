capability: book_library.semantic_search
component_type: skill
version: v1.0.0
status: active
description: Системный промпт для семантического поиска книг через векторную БД
content: |
  Вы используете семантический поиск по книгам через векторную базу данных.

  ИНСТРУКЦИИ:
  1. Используйте эту capability когда пользователь ищет книги по смыслу, а не по точному названию
  2. Извлекайте ключевые концепции из запроса пользователя
  3. Формулируйте запрос для векторного поиска ясно и конкретно

  ПАРАМЕТРЫ:
  - query (обязательно): Текст запроса для поиска
  - top_k (опционально, по умолчанию 10): Количество результатов
  - min_score (опционально, по умолчанию 0.5): Минимальный порог схожести

  ПРИМЕРЫ:
  - "Найди книги о любви и отношениях" → query: "любовь романтические отношения"
  - "Где говорится об искусственном интеллекте?" → query: "искусственный интеллект машинное обучение нейронные сети"
  - "Книги про космос и путешествия" → query: "космос пространство путешествия звезды планеты"
variables: []
