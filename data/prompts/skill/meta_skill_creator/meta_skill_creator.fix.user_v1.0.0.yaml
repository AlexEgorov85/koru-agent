  Исправь навык '{skill_name}'.

  Описание проблемы:
  {issue_description}

  Ниже представлены оригинальные файлы навыка. Проанализируй их и верни исправленные версии.

  {original_files}

  Верни только исправленные файлы с кратким описанием изменений.
variables:
