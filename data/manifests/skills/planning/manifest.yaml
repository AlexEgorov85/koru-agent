component_id: planning
component_type: skill
version: v1.0.0
owner: team-planning
status: active

contracts:
  planning.create_plan:
    input: planning.create_plan_input_v1.0.0
    output: planning.create_plan_output_v1.0.0
  planning.update_plan:
    input: planning.update_plan_input_v1.0.0
    output: planning.update_plan_output_v1.0.0
  planning.get_next_step:
    input: planning.get_next_step_input_v1.0.0
    output: planning.get_next_step_output_v1.0.0
  planning.update_step_status:
    input: planning.update_step_status_input_v1.0.0
    output: planning.update_step_status_output_v1.0.0
  planning.decompose_task:
    input: planning.decompose_task_input_v1.0.0
    output: planning.decompose_task_output_v1.0.0
  planning.mark_task_completed:
    input: planning.mark_task_completed_input_v1.0.0
    output: planning.mark_task_completed_output_v1.0.0

constraints:
  max_steps: 15
  timeout_seconds: 300
  required_capabilities:
    - planning.create_plan
    - planning.update_plan
    - planning.get_next_step
    - planning.update_step_status
    - planning.decompose_task
    - planning.mark_task_completed

quality_metrics:
  success_rate_target: 0.95
  avg_execution_time_ms: 500
  error_rate_threshold: 0.05

success_metrics:
  goal_completion_rate: 0.90
  user_satisfaction_score: 4.5
  retry_rate: 0.10

dependencies:
  components: []
  tools:
    - sql_tool
    - file_tool
  services:
    - prompt_service
    - contract_service
    - table_description_service
    - sql_generation_service

prompts:
  planning.create_plan: planning.create_plan_v1.0.0
  planning.update_plan: planning.update_plan_v1.0.0
  planning.decompose_task: planning.decompose_task_v1.0.0
  planning.mark_task_completed: planning.mark_task_completed_v1.0.0

changelog:
  - version: v1.0.0
    date: "2026-02-17"
    author: alexey
    changes:
      - "Initial release"
      - "Planning skill with hierarchical decomposition"
      - "Added all 6 capabilities implementation"
      - "Added contracts for all capabilities"
      - "Added prompts for all capabilities"
      - "Added event publishing to EventBus"
      - "Updated manifest with dependencies"
