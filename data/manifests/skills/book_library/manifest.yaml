component_id: book_library
component_type: skill
version: v1.0.0
owner: team-library
status: active

contract:
  capabilities:
    - name: book_library.search_books
      description: Динамический поиск книг с генерацией SQL через LLM (гибко, но медленно ~2000мс)
      input_contract: book_library.search_books.input.v1.0.0
      output_contract: book_library.search_books.output.v1.0.0
      prompt: book_library.search_books.v1.0.0
      execution_type: dynamic
      requires_llm: true
    - name: book_library.execute_script
      description: Выполнение заготовленного SQL-скрипта по имени. 10 скриптов: get_all_books, get_books_by_author, get_books_by_genre, get_books_by_year_range, get_book_by_id, count_books_by_author, get_books_by_title_pattern, get_distinct_authors, get_distinct_genres, get_genre_statistics. Быстро ~100мс.
      input_contract: book_library.execute_script.input.v1.0.0
      output_contract: book_library.execute_script.output.v1.0.0
      prompt: book_library.execute_script.v1.1.0
      execution_type: static
      requires_llm: false
    - name: book_library.list_scripts
      description: Получение подробного списка доступных скриптов с описаниями и примерами (используйте если нужна детальная информация)
      input_contract: book_library.list_scripts.input.v1.0.0
      output_contract: book_library.list_scripts.output.v1.0.0
      prompt: null
      execution_type: informational
      requires_llm: false

constraints:
  max_steps: 10
  timeout_seconds: 120
  required_capabilities:
    - sql_tool.execute_query
    - sql_generation.generate_query

quality_metrics:
  success_rate_target: 0.98
  avg_execution_time_ms: 200
  error_rate_threshold: 0.02
  static_script_target_time_ms: 100
  dynamic_search_target_time_ms: 2000

success_metrics:
  goal_completion_rate: 0.95
  user_satisfaction_score: 4.7
  retry_rate: 0.05
  static_script_usage_rate: 0.7

dependencies:
  components: []
  tools:
    - sql_tool
  services:
    - prompt_service
    - contract_service
    - sql_generation_service
    - sql_query_service
    - table_description_service

scripts:
  enabled: true
  registry_module: core.application.skills.book_library.scripts_registry
  allowed_scripts:
    - get_all_books
    - get_books_by_author
    - get_books_by_genre
    - get_books_by_year_range
    - get_book_by_id
    - count_books_by_author
    - get_books_by_title_pattern
    - get_distinct_authors
    - get_distinct_genres
    - get_genre_statistics

changelog:
  - version: v1.0.0
    date: "2026-02-17"
    author: alexey
    changes:
      - "Added book_library.search_books capability (dynamic SQL generation via LLM)"
      - "Added book_library.execute_script capability (static predefined scripts)"
      - "Added scripts_registry.py with 10 predefined SQL scripts"
      - "Updated contracts for both capabilities"
      - "Updated prompts for both capabilities"
