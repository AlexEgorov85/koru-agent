component_id: final_answer
component_type: skill
version: v1.0.0
owner: team-core
status: active

contract:
  capabilities:
    - name: final_answer.generate
      description: Генерация финального ответа на основе всего контекста сессии с поддержкой различных форматов вывода
      input_contract: final_answer.generate.input.v1.0.0
      output_contract: final_answer.generate.output.v1.0.0
      prompt: final_answer.generate.v1.0.0
      execution_type: llm-powered
      requires_llm: true

constraints:
  max_steps: 5
  timeout_seconds: 60
  required_capabilities:
    - prompt_service.get_prompt
    - contract_service.validate

quality_metrics:
  success_rate_target: 0.98
  avg_execution_time_ms: 800
  error_rate_threshold: 0.02
  confidence_score_min: 0.7

success_metrics:
  goal_completion_rate: 0.95
  user_satisfaction_score: 4.8
  retry_rate: 0.02
  structured_output_validity: 0.99

dependencies:
  components: []
  tools: []
  services:
    - prompt_service
    - contract_service

parameters:
  include_evidence: true
  max_confidence_threshold: 0.7
  default_format_type: detailed
  max_sources_to_include: 10

changelog:
  - version: v1.0.0
    date: "2026-02-17"
    author: alexey
    changes:
      - "Initial implementation of final_answer skill"
      - "Added final_answer.generate capability with structured output"
      - "Support for multiple output formats: concise, detailed, structured"
      - "Input/output contracts for validation"
      - "Template-based prompt with Jinja2 rendering"
