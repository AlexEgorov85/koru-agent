component_id: sql_query_service
component_type: service
version: v1.0.0
owner: team-database
status: active

contract:
  input: sql_query.execute_query.input.v1.0.0
  output: sql_query.execute_query.output.v1.0.0

constraints:
  max_connections: 10
  timeout_seconds: 60
  max_result_rows: 10000

quality_metrics:
  success_rate_target: 0.98
  avg_execution_time_ms: 1000
  error_rate_threshold: 0.02

success_metrics:
  goal_completion_rate: 0.96
  user_satisfaction_score: 4.7
  retry_rate: 0.04

dependencies:
  components: []
  tools:
    - sql_tool
  services:
    - prompt_service
    - contract_service

changelog:
  - version: v1.0.0
    date: "2026-02-16"
    author: alexey
    changes:
      - "Initial release"
      - "SQL query execution service with connection pooling"