component_id: sql_tool
component_type: tool
version: v1.0.0
owner: team-database
status: active

contract:
  input: sql_tool.execute_query.input.v1.0.0
  output: sql_tool.execute_query.output.v1.0.0

constraints:
  max_query_length: 1000
  timeout_seconds: 30
  allowed_databases:
    - postgresql
    - mysql

quality_metrics:
  success_rate_target: 0.99
  avg_execution_time_ms: 50
  error_rate_threshold: 0.01

success_metrics:
  goal_completion_rate: 0.98
  user_satisfaction_score: 4.8
  retry_rate: 0.02

dependencies:
  components: []
  tools: []
  services:
    - prompt_service

changelog:
  - version: v1.0.0
    date: "2026-02-16"
    author: alexey
    changes:
      - "Initial release"
      - "SQL execution tool with connection pooling"