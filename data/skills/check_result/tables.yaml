tables:
- columns:
  - column_default: nextval('oarb.audits_id_seq'::regclass)
    column_name: id
    data_type: integer
    description: Уникальный идентификатор проверки
    is_nullable: 'NO'
  - column_default: null
    column_name: title
    data_type: character varying
    description: Наименование / тема проверки
    is_nullable: 'NO'
  - column_default: null
    column_name: audit_type
    data_type: character varying
    description: Тип проверки (плановая, внеплановая и т.д.)
    is_nullable: 'NO'
  - column_default: null
    column_name: planned_date
    data_type: date
    description: Плановая дата проведения проверки
    is_nullable: 'YES'
  - column_default: null
    column_name: actual_date
    data_type: date
    description: Фактическая дата завершения проверки
    is_nullable: 'YES'
  - column_default: '''Запланирована''::character varying'
    column_name: status
    data_type: character varying
    description: Текущий статус проверки
    is_nullable: 'YES'
  - column_default: null
    column_name: auditee_entity
    data_type: character varying
    description: Проверяемый объект (подразделение, компания, филиал)
    is_nullable: 'YES'
  - column_default: CURRENT_TIMESTAMP
    column_name: created_at
    data_type: timestamp without time zone
    description: Дата и время создания записи
    is_nullable: 'YES'
  - column_default: CURRENT_TIMESTAMP
    column_name: updated_at
    data_type: timestamp without time zone
    description: Дата и время последнего обновления
    is_nullable: 'YES'
  description: Проверки (плановые и внеплановые аудиторские мероприятия)
  schema: oarb
  table: audits
- columns:
  - column_default: nextval('oarb.audit_reports_id_seq'::regclass)
    column_name: id
    data_type: integer
    description: Уникальный идентификатор акта
    is_nullable: 'NO'
  - column_default: null
    column_name: audit_id
    data_type: integer
    description: Ссылка на проверку, к которой относится акт (oarb.audits.id)
    is_nullable: 'NO'
  - column_default: null
    column_name: report_number
    data_type: character varying
    description: Номер акта (внутренняя нумерация)
    is_nullable: 'NO'
  - column_default: null
    column_name: report_date
    data_type: date
    description: Дата составления акта
    is_nullable: 'NO'
  - column_default: null
    column_name: title
    data_type: character varying
    description: Название акта / заголовок документа
    is_nullable: 'NO'
  - column_default: null
    column_name: full_text
    data_type: text
    description: Полный текст акта (если не используется разбивка по пунктам)
    is_nullable: 'YES'
  - column_default: CURRENT_TIMESTAMP
    column_name: created_at
    data_type: timestamp without time zone
    description: Дата и время создания записи
    is_nullable: 'YES'
  - column_default: CURRENT_TIMESTAMP
    column_name: updated_at
    data_type: timestamp without time zone
    description: Дата и время последнего обновления
    is_nullable: 'YES'
  description: Акты аудиторской проверки (оформленные документы по результатам)
  schema: oarb
  table: audit_reports
- columns:
  - column_default: nextval('oarb.report_items_id_seq'::regclass)
    column_name: id
    data_type: integer
    description: Уникальный идентификатор пункта акта
    is_nullable: 'NO'
  - column_default: null
    column_name: report_id
    data_type: integer
    description: Ссылка на акт, которому принадлежит пункт (oarb.audit_reports.id)
    is_nullable: 'NO'
  - column_default: null
    column_name: item_number
    data_type: character varying
    description: Номер пункта (может содержать буквы, цифры, иерархию)
    is_nullable: 'NO'
  - column_default: null
    column_name: item_title
    data_type: character varying
    description: Название пункта (заголовок раздела)
    is_nullable: 'NO'
  - column_default: null
    column_name: item_content
    data_type: text
    description: Текст содержания пункта
    is_nullable: 'YES'
  - column_default: null
    column_name: order_index
    data_type: integer
    description: Порядковый индекс для ручной сортировки
    is_nullable: 'YES'
  - column_default: CURRENT_TIMESTAMP
    column_name: created_at
    data_type: timestamp without time zone
    description: Дата и время создания записи
    is_nullable: 'YES'
  - column_default: CURRENT_TIMESTAMP
    column_name: updated_at
    data_type: timestamp without time zone
    description: Дата и время последнего обновления
    is_nullable: 'YES'
  description: Пункты (разделы) акта аудиторской проверки с текстовым наполнением
  schema: oarb
  table: report_items
- columns:
  - column_default: nextval('oarb.violations_id_seq'::regclass)
    column_name: id
    data_type: integer
    description: Уникальный идентификатор отклонения
    is_nullable: 'NO'
  - column_default: null
    column_name: audit_id
    data_type: integer
    description: Ссылка на проверку, в ходе которой выявлено отклонение (oarb.audits.id)
    is_nullable: 'NO'
  - column_default: null
    column_name: report_id
    data_type: integer
    description: Ссылка на акт, в котором зафиксировано отклонение (oarb.audit_reports.id)
    is_nullable: 'NO'
  - column_default: null
    column_name: item_id
    data_type: integer
    description: Ссылка на конкретный пункт акта, к которому относится отклонение
      (oarb.report_items.id)
    is_nullable: 'NO'
  - column_default: null
    column_name: violation_code
    data_type: character varying
    description: Код нарушения по внутреннему классификатору (если используется)
    is_nullable: 'YES'
  - column_default: null
    column_name: description
    data_type: text
    description: Подробное описание сути отклонения
    is_nullable: 'NO'
  - column_default: null
    column_name: recommendation
    data_type: text
    description: Рекомендации аудитора по устранению нарушения
    is_nullable: 'YES'
  - column_default: null
    column_name: severity
    data_type: character varying
    description: Критичность нарушения (Низкая, Средняя, Высокая)
    is_nullable: 'NO'
  - column_default: '''Открыто''::character varying'
    column_name: status
    data_type: character varying
    description: Текущий статус работы с нарушением
    is_nullable: 'YES'
  - column_default: null
    column_name: responsible
    data_type: character varying
    description: Ответственное лицо или подразделение за устранение
    is_nullable: 'YES'
  - column_default: null
    column_name: deadline
    data_type: date
    description: Плановая дата устранения нарушения
    is_nullable: 'YES'
  - column_default: CURRENT_TIMESTAMP
    column_name: created_at
    data_type: timestamp without time zone
    description: Дата и время фиксации отклонения в системе
    is_nullable: 'YES'
  - column_default: CURRENT_TIMESTAMP
    column_name: updated_at
    data_type: timestamp without time zone
    description: Дата и время последнего изменения записи
    is_nullable: 'YES'
  description: Отклонения (нарушения, проблемы), выявленные в ходе аудита
  schema: oarb
  table: violations
