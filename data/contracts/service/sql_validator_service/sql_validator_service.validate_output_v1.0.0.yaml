capability: sql_validator_service.validate
version: v1.0.0
status: active
component_type: service
direction: output
description: Output contract for SQL validator service
schema_data:
  type: object
  properties:
    sql:
      type: string
      description: Original or sanitized SQL query
    parameters:
      type: object
      description: Query parameters
    is_valid:
      type: boolean
      description: Whether the SQL query is valid
    validation_errors:
      type: array
      description: List of validation errors
      items:
        type: string
    safety_score:
      type: number
      description: Safety score 0.0-1.0
  required:
    - is_valid
