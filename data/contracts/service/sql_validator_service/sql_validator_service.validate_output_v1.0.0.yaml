capability: sql_validator_service.validate
version: v1.0.0
status: active
component_type: service
direction: output
description: Output contract for SQL validator service
schema_data:
  type: object
  properties:
    valid:
      type: boolean
      description: Whether the SQL query is valid
    errors:
      type: array
      description: List of validation errors
      items:
        type: string
    query_type:
      type: string
      description: Type of SQL query (SELECT, INSERT, etc.)
  required:
    - valid
