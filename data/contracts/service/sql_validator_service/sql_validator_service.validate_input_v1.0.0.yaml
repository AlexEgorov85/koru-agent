capability: sql_validator_service.validate
version: v1.0.0
status: active
component_type: service
direction: input
description: >
  Входной контракт сервиса валидации SQL-запросов.
  Проверяет безопасность и корректность SQL.
schema_data:
  type: object
  properties:
    sql:
      type: string
      description: >
        SQL-запрос для валидации.
        Проверяется на безопасность (только SELECT).
    parameters:
      type: object
      description: >
        Словарь параметров запроса для проверки.
        Пример: {"1": "Иванов", "2": 100}
      additionalProperties: true
  required:
    - sql
