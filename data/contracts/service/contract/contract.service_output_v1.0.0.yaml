capability: contract.service
component_type: service
direction: output
status: active
version: v1.0.0
description: >
  Выходной контракт сервиса контрактов.
  Возвращает запрошенную схему контракта.
schema_data:
  type: object
  properties:
    capability:
      type: string
      description: >
        Имя capability для которой запрошен контракт.
    direction:
      type: string
      description: >
        Направление контракта.
        "input" или "output".
    schema:
      type: object
      description: >
        Схема контракта (JSON Schema).
        Содержит структуру валидации для capability.
  required:
    - capability
    - direction
    - schema