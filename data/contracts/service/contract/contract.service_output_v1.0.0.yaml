capability: contract.service
component_type: service
direction: output
status: active
version: v1.0.0
description: "Output contract for contract service"
schema_data:
  $schema: "http://json-schema.org/draft-07/schema#"
  type: object
  properties:
    result:
      type: object
      description: "Validation result"
      properties:
        success:
          type: boolean
          description: "Whether validation was successful"
        errors:
          type: array
          items:
            type: string
          description: "List of validation errors if any"
        processed_contract:
          type: object
          description: "Processed contract data"
  required:
    - result