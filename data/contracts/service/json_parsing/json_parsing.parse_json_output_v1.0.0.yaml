capability: json_parsing.parse_json
version: v1.0.0
status: active
component_type: service
direction: output
description: Выходной контракт для распарсенных JSON данных
schema_data:
  type: object
  properties:
    status:
      type: string
      description: Статус парсинга (success или parse_error)
    parsed_data:
      type: object
      description: Распарсенные данные (dict, list или примитив)
    error_type:
      type: string
      description: Тип ошибки если парсинг не удался
    error_message:
      type: string
      description: Человекочитаемое описание ошибки
    error_details:
      type: array
      description: Детали ошибки (строка, колонка, позиция)
      items:
        type: object
    processing_steps:
      type: array
      description: Трассировка шагов парсинга для отладки
      items:
        type: string
  required:
    - status
