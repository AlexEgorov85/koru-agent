capability: sql_generation.correct_query
component_type: service
description: >
  Входной контракт сервиса коррекции SQL-запросов.
  Принимает оригинальный запрос, тип ошибки и сообщение об ошибке.
direction: input
schema_data:
  type: object
  properties:
    original_query:
      type: string
      description: >
        Оригинальный SQL-запрос, который вызвал ошибку.
    error_type:
      type: string
      description: >
        Тип ошибки (syntax_error, schema_error, permission_error, timeout_error).
        Пример: "syntax_error"
    error_message:
      type: string
      description: >
        Сообщение об ошибке от базы данных.
        Пример: "relation \"books\" does not exist"
    suggested_fix:
      type: string
      description: >
        Предлагаемое исправление от анализатора ошибок (опционально).
        Пример: "Замените 'books' на 'book'"
  required:
    - original_query
    - error_type
    - error_message
status: active
version: v1.0.0
