capability: sql_generation
component_type: service
description: >
  Выходной контракт сервиса генерации SQL-запросов.
  Возвращает сгенерированный SQL с метаданными и самоанализом.
direction: output
schema_data:
  type: object
  properties:
    analysis_understanding:
      type: string
      description: "1. Понимание запроса: Какие сущности, условия и связи упоминаются пользователем?"
    analysis_schema:
      type: string
      description: "2. Анализ схемы: Какие таблицы и колонки требуются?"
    analysis_strategy:
      type: string
      description: "3. Выбор стратегии: Будет ли это простой SELECT, агрегация, подзапрос или CTE?"
    analysis_validation:
      type: string
      description: "4. Валидация параметров: Все ли условия учтены?"
    analysis_security:
      type: string
      description: "5. Безопасность: Соответствует ли запрос политике SELECT-ONLY?"
    analysis_optimization:
      type: string
      description: "6. Оптимизация: Можно ли улучшить производительность?"
    generated_sql:
      type: string
      description: Сгенерированный SQL-запрос. ТОЛЬКО код, без markdown.
    confidence_score:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: "7. Оценка уверенности (0.0-1.0)"
    potential_issues:
      type: array
      items:
        type: string
      description: "8. Потенциальные проблемы"
      default: []
    final_check:
      type: string
      description: "9. Финальная проверка: соответствует ли SQL запросу?"
    parameters:
      type: object
      description: >
        Словарь параметров для подстановки в SQL.
        Ключи: "1", "2", "3" и т.д.
        Пример: {"1": "Толстой", "2": 1850}
      additionalProperties: true
    reasoning:
      type: string
      description: >
        Объяснение выбора SQL-конструкции.
        Почему выбран такой запрос.
    tables_used:
      type: array
      description: >
        Список таблиц, использованных в запросе.
        Пример: ["Lib.books", "Lib.authors"]
      items:
        type: string
    safety_score:
      type: number
      description: >
        Оценка безопасности запроса (0.0–1.0).
        1.0 — полностью безопасен, 0.0 — опасен.
    generation_id:
      type: string
      description: >
        Уникальный идентификатор генерации.
        Используется для отслеживания и коррекции.
  required:
    - generated_sql
    - confidence_score
status: active
version: v1.0.0
