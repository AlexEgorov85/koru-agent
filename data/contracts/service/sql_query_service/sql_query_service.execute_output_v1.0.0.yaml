capability: sql_query_service.execute_query
version: v1.0.0
status: active
component_type: service
direction: output
description: >
  Выходной контракт сервиса выполнения SQL-запросов.
  Возвращает результат запроса с метаданными выполнения.
schema_data:
  type: object
  properties:
    query_result:
      type: object
      description: >
        Результат выполнения SQL-запроса (DBQueryResult).
      properties:
        success:
          type: boolean
          description: Флаг успешности выполнения
        rows:
          type: array
          description: >
            Массив строк — результат запроса.
            Каждая строка — объект с колонками.
          items:
            type: object
        columns:
          type: array
          description: >
            Список имён колонок.
            Пример: ["id", "title", "author"]
          items:
            type: string
        rowcount:
          type: integer
          description: Общее количество возвращённых строк
        execution_time:
          type: number
          description: >
            Время выполнения в секундах.
            Пример: 0.125 — 125 мс
        error:
          type: string
          description: >
            Сообщение об ошибке (при неудаче).
            Null если запрос успешен.
    capability:
      type: string
      description: Имя выполненной capability
  required:
    - query_result
    - capability
