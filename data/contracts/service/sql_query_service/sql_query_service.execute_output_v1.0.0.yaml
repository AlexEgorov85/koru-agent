capability: sql_query_service.execute_query
version: v1.0.0
status: active
component_type: service
direction: output
description: >
  Выходной контракт сервиса выполнения SQL-запросов.
  Возвращает результат выполнения запроса с метаданными.
schema_data:
  type: object
  properties:
    rows:
      type: array
      description: >
        Массив строк — результат выполнения SQL-запроса.
        Каждая строка — объект с колонками как ключами.
        Пример: [{"id": 1, "name": "Иванов"}, {"id": 2, "name": "Петров"}]
      items:
        type: object
    columns:
      type: array
      description: >
        Список имён колонок в порядке их следования в результате.
        Пример: ["id", "name", "created_at"]
      items:
        type: string
    rowcount:
      type: integer
      description: >
        Общее количество возвращённых строк.
        Равно длине массива rows.
    execution_time:
      type: number
      description: >
        Время выполнения запроса в секундах (с дробной частью).
        Пример: 0.125 — 125 миллисекунд.
  required:
    - rows
    - columns
    - rowcount
