capability: sql_query_service.execute_query
version: v1.0.0
status: active
component_type: service
direction: input
description: >
  Входной контракт сервиса выполнения SQL-запросов.
  Поддерживает два режима:
  1. Готовый SQL: sql_query (+ parameters, max_rows) — выполняет напрямую
  2. Генерация: user_question + tables — генерирует SQL через LLM и выполняет
schema_data:
  type: object
  properties:
    sql_query:
      type: string
      description: >
        Готовый SQL-запрос для выполнения (РЕЖИМ 1).
        Если указан — выполняется напрямую без генерации.
        Должен содержать только безопасные операции (SELECT).
    parameters:
      type: object
      description: >
        Словарь параметров для готового SQL (РЕЖИМ 1).
        Ключи: "1", "2", "3" и т.д.
        Пример: {"1": "Иванов", "2": 100}
      additionalProperties: true
    user_question:
      type: string
      description: >
        Вопрос пользователя на естественном языке (РЕЖИМ 2).
        Если указан (без sql_query) — сервис сгенерирует SQL через LLM.
        Пример: "Покажи все книги Гоголя"
    tables:
      type: array
      description: >
        Список таблиц для генерации SQL (РЕЖИМ 2).
        Ограничивает область генерации.
        Пример: ["Lib.books", "Lib.authors"]
      items:
        type: string
    max_rows:
      type: integer
      description: >
        Максимальное количество строк для возврата.
        Работает в обоих режимах. По умолчанию 50.
      default: 50
  required: []
