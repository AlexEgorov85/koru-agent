capability: sql_query_service.execute_query
version: v1.0.0
status: active
component_type: service
direction: input
description: >
  Входной контракт сервиса выполнения SQL-запросов.
  Принимает вопрос пользователя и список таблиц для генерации и выполнения SQL.
schema_data:
  type: object
  properties:
    user_question:
      type: string
      description: >
        Вопрос пользователя на естественном языке.
        Сервис самостоятельно сгенерирует и выполнит SQL.
        Пример: "Покажи все книги Гоголя"
    tables:
      type: array
      description: >
        Список таблиц, к которым разрешён доступ.
        Ограничивает область генерации SQL.
        Пример: ["Lib.books", "Lib.authors"]
      items:
        type: string
    max_rows:
      type: integer
      description: >
        Максимальное количество строк для возврата.
        По умолчанию 50. Ограничивает размер результата.
      default: 50
  required:
    - user_question
    - tables
