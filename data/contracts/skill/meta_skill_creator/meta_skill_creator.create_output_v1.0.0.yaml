capability: meta_skill_creator.create
component_type: skill
description: Выходной контракт для создания компонента
direction: output
schema_data:
  type: object
  properties:
    success:
      type: boolean
      description: Успешно ли выполнена операция
    component_name:
      type: string
      description: Уникальное имя компонента (snake_case)
    component_type:
      type: string
      description: Тип компонента (skill/tool/service/behavior)
    class_name:
      type: string
      description: Имя класса (PascalCase + суффикс типа)
    validation:
      type: object
      description: Результат валидации артефактов
      properties:
        is_valid:
          type: boolean
        error_count:
          type: integer
        warning_count:
          type: integer
        errors:
          type: array
          items:
            type: object
    deployment:
      type: object
      description: Результат записи файлов
      properties:
        success:
          type: boolean
        written_files:
          type: array
          items:
            type: string
        errors:
          type: array
          items:
            type: string
    files_written:
      type: array
      items:
        type: string
      description: Список записанных файлов
    register_after:
      type: boolean
      description: Требуется ли регистрация в контексте
    message:
      type: string
      description: Информационное сообщение для оператора
    error:
      type: string
      description: Текст ошибки (если success=False)
  required:
    - success
    - component_name
    - component_type
    - message
  additionalProperties: false
status: active
version: v1.0.0
