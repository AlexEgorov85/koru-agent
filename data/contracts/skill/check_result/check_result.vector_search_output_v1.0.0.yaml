capability: check_result.vector_search
component_type: skill
description: Output contract for check_result.vector_search - список результатов семантического поиска по нарушениям (violations)
direction: output
schema_data:
  type: array
  description: Список результатов семантического поиска по нарушениям (уникальные строки, без дублей по id)
  items:
    type: object
    properties:
      type:
        type: string
        description: Тип найденного объекта (всегда "violations")
        enum:
          - violations
      score:
        type: number
        description: Оценка схожести (от 0.0 до 1.0)
      violation_id:
        type: integer
        description: ID нарушения
      violation_code:
        type: string
        description: Код нарушения
      description:
        type: string
        description: Описание нарушения
      recommendation:
        type: string
        description: Рекомендация по устранению
      severity:
        type: string
        description: Критичность нарушения
      status:
        type: string
        description: Статус нарушения
      responsible:
        type: string
        description: Ответственное лицо
      deadline:
        type: string
        description: Срок устранения
      audit_id:
        type: integer
        description: ID аудиторской проверки
      audit_title:
        type: string
        description: Название проверки
      matched_text:
        type: string
        description: Текст, по которому найдено совпадение (до 300 символов)
      row:
        type: object
        description: Исходная строка данных из БД (полные данные для анализа)
        additionalProperties: true
    additionalProperties: true
status: active
version: v1.0.0
