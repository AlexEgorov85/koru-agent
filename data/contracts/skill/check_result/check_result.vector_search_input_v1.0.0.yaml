capability: check_result.vector_search
component_type: skill
description: Input contract for check_result.vector_search - семантический поиск по нарушениям (violations)
direction: input
schema_data:
  type: object
  properties:
    query:
      type: string
      description: Текст запроса для семантического поиска (например, "нарушения в сфере закупок")
    top_k:
      type: integer
      description: Количество возвращаемых результатов (null = без лимита)
      default: null
      minimum: 1
      maximum: 100
      nullable: true
    min_score:
      type: number
      description: Минимальный порог схожести (от 0.0 до 1.0)
      default: 0.5
      minimum: 0.0
      maximum: 1.0
      nullable: true
  required:
    - query
status: active
version: v1.0.0
