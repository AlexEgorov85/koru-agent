capability: book_library.semantic_search
version: v1.0.0
status: active
component_type: skill
direction: output
description: Результаты семантического поиска книг
schema_data:
  type: object
  properties:
    results:
      type: array
      description: "Список найденных результатов"
      items:
        type: object
        properties:
          chunk_id:
            type: string
            description: "Уникальный идентификатор чанка"
          document_id:
            type: string
            description: "Идентификатор документа (книги)"
          book_id:
            type: integer
            description: "ID книги в базе данных"
          chapter:
            type: integer
            description: "Номер главы"
          score:
            type: number
            description: "Оценка схожести (от 0.0 до 1.0)"
          content:
            type: string
            description: "Текст найденного чанка"
          metadata:
            type: object
            description: "Дополнительные метаданные"
    total_found:
      type: integer
      description: "Общее количество найденных результатов"
    execution_type:
      type: string
      description: "Тип выполнения (vector)"
      default: "vector"
  required:
    - results
    - total_found
  additionalProperties: false
