capability: book_library.semantic_search
version: v1.0.0
status: active
component_type: skill
direction: input
description: Входные данные для семантического поиска книг через векторную БД
schema_data:
  type: object
  properties:
    query:
      type: string
      description: "Текст запроса для семантического поиска"
      minLength: 1
      maxLength: 10000
    top_k:
      type: integer
      description: "Количество результатов для возврата"
      default: 10
      minimum: 1
      maximum: 100
    min_score:
      type: number
      description: "Минимальный порог схожести (от 0.0 до 1.0)"
      default: 0.5
      minimum: 0.0
      maximum: 1.0
  required:
    - query
  additionalProperties: false
