capability: book_library.execute_script
component_type: skill
description: Входной контракт для выполнения заготовленного SQL-скрипта по имени
direction: input
schema_data:
  type: object
  properties:
    script_name:
      type: string
      description: Имя заготовленного скрипта для выполнения (например, 'get_all_books', 'get_books_by_author')
    author:
      type: string
      description: Имя автора (для get_books_by_author)
    genre:
      type: string
      description: Жанр книги (для get_books_by_genre)
    year_from:
      type: integer
      description: Начальный год диапазона (для get_books_by_year_range)
    year_to:
      type: integer
      description: Конечный год диапазона (для get_books_by_year_range)
    book_id:
      type: integer
      description: ID книги (для get_book_by_id)
    title_pattern:
      type: string
      description: Шаблон названия (для get_books_by_title_pattern)
    max_rows:
      type: integer
      minimum: 1
      maximum: 1000
      default: 100
      description: Максимальное количество строк для возврата
  required:
    - script_name
  additionalProperties: true
status: active
version: v1.0.0
