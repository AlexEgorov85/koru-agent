capability: book_library.search_books
component_type: skill
description: Входной контракт для динамического поиска книг с генерацией SQL через LLM
direction: input
schema_data:
  type: object
  properties:
    query:
      type: string
      description: Текстовый запрос пользователя для поиска книг (например, 'книги про искусственный интеллект' или 'автор Пушкин')
    max_results:
      type: integer
      minimum: 1
      maximum: 100
      default: 10
      description: Максимальное количество результатов для возврата
  required:
    - query
  additionalProperties: false
status: active
version: v1.0.0
