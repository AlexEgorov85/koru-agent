capability: book_library.search_books
component_type: skill
description: Выходной контракт для динамического поиска книг
direction: output
schema_data:
  type: object
  properties:
    rows:
      type: array
      description: Список найденных книг
      items:
        type: object
        properties:
          book_id:
            type: integer
            description: ID книги
          book_title:
            type: string
            description: Название книги
          isbn:
            type: string
            description: ISBN книги
          publication_date:
            type: string
            format: date
            description: Дата публикации
          author_id:
            type: integer
            description: ID автора
          first_name:
            type: string
            description: Имя автора
          last_name:
            type: string
            description: Фамилия автора
          birth_date:
            type: string
            format: date
            description: Дата рождения автора
    rowcount:
      type: integer
      description: Количество найденных строк
    execution_time:
      type: number
      description: Время выполнения в секундах
    execution_type:
      type: string
      enum:
        - dynamic
        - static
      description: Тип выполнения (dynamic для генерации SQL через LLM)
    sql_query:
      type: string
      description: Сгенерированный SQL-запрос
    error:
      type: string
      description: Сообщение об ошибке (если произошла ошибка)
  required:
    - rows
    - rowcount
    - execution_type
status: active
version: v1.0.0
