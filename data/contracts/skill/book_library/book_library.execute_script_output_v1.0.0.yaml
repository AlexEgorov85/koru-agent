capability: book_library.execute_script
component_type: skill
description: Выходной контракт для выполнения заготовленного SQL-скрипта
direction: output
schema_data:
  type: object
  properties:
    rows:
      type: array
      description: Список результатов выполнения скрипта
      items:
        type: object
        description: Строка результата (зависит от скрипта)
        properties:
          book_id:
            type: integer
            description: ID книги
          book_title:
            type: string
            description: Название книги
          isbn:
            type: string
            description: ISBN книги
          publication_date:
            type: string
            format: date
            description: Дата публикации
          author_id:
            type: integer
            description: ID автора
          first_name:
            type: string
            description: Имя автора
          last_name:
            type: string
            description: Фамилия автора
          birth_date:
            type: string
            format: date
            description: Дата рождения автора
          genre:
            type: string
            description: Жанр книги
          count:
            type: integer
            description: Количество (для скриптов подсчёта)
          avg_year:
            type: number
            description: Средний год (для статистики)
    rowcount:
      type: integer
      description: Количество возвращённых строк
    execution_time:
      type: number
      description: Время выполнения в секундах
    execution_type:
      type: string
      enum:
        - dynamic
        - static
      description: Тип выполнения (static для заготовленных скриптов)
    script_name:
      type: string
      description: Имя выполненного скрипта
    error:
      type: string
      description: Сообщение об ошибке (если произошла ошибка)
  required:
    - rows
    - rowcount
    - execution_type
    - script_name
status: active
version: v1.0.0
