capability: book_library.list_scripts
component_type: skill
description: Выходной контракт для получения списка доступных скриптов
direction: output
schema_data:
  type: object
  properties:
    scripts:
      type: array
      description: Список доступных скриптов
      items:
        type: object
        properties:
          name:
            type: string
            description: Имя скрипта
          description:
            type: string
            description: Описание скрипта
          required_parameters:
            type: array
            description: Обязательные параметры скрипта
            items:
              type: string
          optional_parameters:
            type: array
            description: Необязательные параметры скрипта
            items:
              type: string
          max_rows:
            type: integer
            description: Максимальное количество строк по умолчанию
          example_parameters:
            type: object
            description: Пример параметров для вызова скрипта
            additionalProperties: true
    total_count:
      type: integer
      description: Общее количество доступных скриптов
  required:
    - scripts
    - total_count
status: active
version: v1.0.0
