capability: meta_component_creator.fix
component_type: skill
description: Выходной контракт для исправления компонента
direction: output
schema_data:
  type: object
  properties:
    component_name:
      type: string
      description: Имя исправляемого компонента
    component_type:
      type: string
      description: Тип компонента
    patched_files:
      type: object
      description: Исправленные файлы (filename -> content)
      additionalProperties:
        type: string
    is_valid:
      type: boolean
      default: false
    validation_errors:
      type: array
      items:
        type: string
      default: []
    change_summary:
      type: string
      description: Краткое описание внесённых изменений
      default: ""
  required:
    - component_name
    - component_type
status: active
version: v1.0.0
