capability: meta_component_creator.fix
component_type: skill
description: Входной контракт для исправления компонента
direction: input
schema_data:
  type: object
  properties:
    component_name:
      type: string
      description: Имя существующего компонента
    component_type:
      type: string
      enum:
        - skill
        - tool
        - service
        - behavior
      description: "Тип компонента: 'skill', 'tool', 'service', 'behavior'"
      default: skill
    issue_description:
      type: string
      description: Описание проблемы или желаемого улучшения
  required:
    - component_name
    - issue_description
  additionalProperties: false
status: active
version: v1.0.0
