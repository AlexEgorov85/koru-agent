capability: meta_component_creator.create
component_type: skill
description: Выходной контракт для создания компонента
direction: output
schema_data:
  type: object
  properties:
    component_name:
      type: string
      description: Уникальное имя компонента (snake_case)
    component_type:
      type: string
      description: "Тип: 'skill', 'tool', 'service', 'behavior'"
    class_name:
      type: string
      description: Имя класса (PascalCase + суффикс типа)
    python_files:
      type: array
      description: Сгенерированные Python-файлы
      items:
        type: object
        properties:
          filename:
            type: string
            description: "Имя файла, например 'skill.py' или 'my_tool.py'"
          content:
            type: string
            description: Содержимое файла
          file_type:
            type: string
            description: "Тип файла: 'main', 'handler', 'helper', 'input_output'"
            default: main
        required:
          - filename
          - content
    yaml_files:
      type: array
      description: Сгенерированные YAML-файлы (промпты и контракты)
      items:
        type: object
        properties:
          filename:
            type: string
            description: "Имя файла, например 'create.user_v1.0.0.yaml'"
          content:
            type: string
            description: Содержимое YAML
          file_category:
            type: string
            description: "Категория: 'prompt' или 'contract'"
            default: prompt
          direction:
            type: string
            description: "Для контрактов: 'input' или 'output'"
            nullable: true
        required:
          - filename
          - content
    is_valid:
      type: boolean
      description: Результат валидации
      default: false
    validation_errors:
      type: array
      items:
        type: string
      default: []
  required:
    - component_name
    - component_type
    - class_name
status: active
version: v1.0.0
