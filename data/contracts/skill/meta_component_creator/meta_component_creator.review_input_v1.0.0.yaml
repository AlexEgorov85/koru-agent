capability: meta_component_creator.review
component_type: skill
description: Входной контракт для код-ревью компонента
direction: input
schema_data:
  type: object
  properties:
    component_name:
      type: string
      description: Имя компонента для код-ревью
    component_type:
      type: string
      enum:
        - skill
        - tool
        - service
        - behavior
      description: "Тип компонента: 'skill', 'tool', 'service', 'behavior'"
      default: skill
    review_focus:
      type: array
      items:
        type: string
        enum:
          - security
          - architecture
          - style
          - performance
      description: "Фокус ревью: ['security', 'architecture', 'style', 'performance']"
      nullable: true
  required:
    - component_name
  additionalProperties: false
status: active
version: v1.0.0
