capability: data_analysis.analyze_step_data
version: v1.0.0
status: active
component_type: skill
direction: input
schema_data:
  type: object
  properties:
    step_id:
      type: string
      description: ID шага для анализа
    question:
      type: string
      description: Вопрос или задача для анализа данных
    mode:
      type: string
      enum: [auto, python, llm, semantic, code]
      default: auto
      description: Режим анализа. auto=автоопределение, python=только Python, llm=LLM планирует, semantic=текст, code=генерация кода
    max_retries:
      type: integer
      default: 2
      description: Максимум попыток при ошибке валидации/исполнения
    timeout_seconds:
      type: number
      default: 5.0
      description: Лимит времени на исполнение в секундах
  required: [step_id, question]