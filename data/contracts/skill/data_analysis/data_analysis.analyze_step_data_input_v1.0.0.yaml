capability: data_analysis.analyze_step_data
version: v1.0.0
status: active
component_type: skill
direction: input
description: Input contract for analyzing step data

schema_data:
  type: object
  properties:
    step_id:
      type: string
      description: ID of the step to analyze
    question:
      type: string
      description: Question to answer based on the data
    data_source:
      type: object
      properties:
        type:
          type: string
          enum: [file, database, memory]
        path:
          type: string
          description: File path or table name
        query:
          type: string
          description: Optional SQL query for filtering
        content:
          type: string
          description: Raw data content (for memory type)
    analysis_config:
      type: object
      properties:
        chunk_size:
          type: integer
          description: Tokens per chunk for large data
          default: 2000
        aggregation_method:
          type: string
          enum: [summary, statistical, extractive, generative]
          default: summary
        max_chunks:
          type: integer
          description: Maximum chunks to process
          default: 50
        max_response_tokens:
          type: integer
          default: 2000
        max_rows:
          type: integer
          description: Maximum rows to fetch from database
          default: 10000
  required:
    - step_id
    - question
    - data_source
