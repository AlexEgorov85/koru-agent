capability: data_analysis.analyze_step_data
component_type: skill
description: Input contract for data_analysis.analyze_step_data - анализ данных шага с LLM и MapReduce
direction: input
schema_data:
  type: object
  properties:
    question:
      type: string
      description: Вопрос для анализа
    step_id:
      type: integer
      description: Номер шага, данные которого нужно проанализировать
    mode:
      type: string
      enum:
        - auto
        - python
        - llm
        - mapreduce
      description: Режим анализа (auto = выбор стратегии автоматически)
  required:
    - question
    - step_id
status: active
version: v1.0.0
