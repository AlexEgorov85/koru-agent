capability: data_analysis.analyze_step_data
version: v1.0.0
status: active
component_type: skill
direction: input
schema_data:
  type: object
  properties:
    step_id:
      type: string
      description: ID шага для анализа
    question:
      type: string
      description: Вопрос к данным
    mode:
      type: string
      enum: [python, llm, semantic, auto]
      default: auto
      description: Режим анализа (python=детерминированный, llm=интерпретация, semantic=текст, auto=автовыбор)
    max_rows:
      type: integer
      default: 10000
      description: Максимум строк для обработки
    max_response_chars:
      type: integer
      default: 8000
      description: Максимум символов в ответе
  required: [step_id, question]