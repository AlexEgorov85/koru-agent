capability: data_analysis.analyze_step_data
component_type: skill
description: Output contract for data_analysis.analyze_step_data - результат анализа данных
direction: output
schema_data:
  type: object
  properties:
    answer:
      type: string
      description: Текстовый ответ на вопрос
    execution_status:
      type: string
      enum:
        - success
        - error
        - skipped
      description: Статус выполнения
    execution_error:
      type: string
      description: Текст ошибки если status=error
    confidence:
      type: number
      description: Уверенность 0.0-1.0
    executed_operations:
      type: array
      items:
        type: string
      description: Список выполненных операций
    metadata:
      type: object
      description: Метаданные (mode_used, chunks_created, processing_time_ms)
  required:
    - answer
    - execution_status
    - confidence
    - executed_operations
status: active
version: v1.0.0
