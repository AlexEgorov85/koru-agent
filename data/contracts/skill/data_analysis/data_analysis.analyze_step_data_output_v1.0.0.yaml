capability: data_analysis.analyze_step_data
version: v1.0.0
status: active
component_type: skill
direction: output
schema_data:
  type: object
  properties:
    answer:
      type: string
      description: Финальный текстовый ответ на вопрос
    executed_operations:
      type: array
      description: Список выполненных операций
      items:
        type: string
    execution_status:
      type: string
      enum: [success, error, skipped]
      description: Статус выполнения
    execution_error:
      type: string
      description: Текст ошибки если execution_status=error
    confidence:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Уверенность в ответе 0.0-1.0
    metadata:
      type: object
      description: Метаданные выполнения
      properties:
        mode_used:
          type: string
          description: Режим который был использован
        row_count:
          type: integer
          description: Количество обработанных строк
        processing_time_ms:
          type: number
          description: Время обработки в миллисекундах
        data_type:
          type: string
          description: Тип данных tabular или text
        retries_used:
          type: integer
          description: Количество попыток
  required: [answer, execution_status, confidence]