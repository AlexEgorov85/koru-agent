capability: data_analysis.analyze_step_data
version: v1.0.0
status: active
component_type: skill
direction: output
schema_data:
  type: object
  properties:
    answer:
      type: string
      description: Текстовый ответ
    stats:
      type: object
      description: Статистика (для режима python)
    profile:
      type: object
      description: Профиль данных (типы, nulls, min/max/mean)
    confidence:
      type: number
      minimum: 0
      maximum: 1
      description: Уверенность в ответе (0-1)
    metadata:
      type: object
      description: Дополнительные данные
      properties:
        mode:
          type: string
          description: Фактический режим выполнения
        processing_time_ms:
          type: number
          description: Время обработки в мс
        rows_processed:
          type: integer
          description: Количество обработанных строк
        chunks_processed:
          type: integer
          description: Количество обработанных чанков
        data_size_mb:
          type: number
          description: Размер данных в MB
        columns:
          type: array
          items:
            type: string
          description: Имена колонок