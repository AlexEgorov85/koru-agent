capability: behavior.react.think
component_type: behavior
description: Output contract for behavior.react.think - результат рассуждения ReAct
direction: output
schema_data:
  type: object
  properties:
    thought:
      type: string
      description: Развёрнутое рассуждение о текущей ситуации
    analysis:
      type: object
      description: Анализ текущей ситуации
      required:
        - progress
        - current_state
        - issues
      properties:
        progress:
          type: string
          description: Описание прогресса к цели
        current_state:
          type: string
          description: Текущее состояние задачи
        issues:
          type: array
          items:
            type: string
          description: Список проблем, если есть
    decision:
      type: object
      description: Решение о следующем действии
      required:
        - next_action
        - reasoning
        - parameters
        - expected_outcome
      properties:
        next_action:
          type: string
          description: Название следующего действия (capability_name)
        reasoning:
          type: string
          description: Обоснование выбора
        parameters:
          type: object
          description: Параметры для capability
          additionalProperties: true
        expected_outcome:
          type: string
          description: Ожидаемый результат
    confidence:
      type: number
      description: Уверенность в решении (0.0-1.0)
      minimum: 0
      maximum: 1
    alternative_actions:
      type: array
      items:
        type: object
        properties:
          next_action:
            type: string
          reasoning:
            type: string
          parameters:
            type: object
            additionalProperties: true
          expected_outcome:
            type: string
      description: Альтернативные действия (массив объектов с полями next_action, reasoning, parameters, expected_outcome)
    stop_condition:
      type: boolean
      description: Флаг завершения работы
    stop_reason:
      type: string
      description: Причина остановки
  required:
    - thought
    - analysis
    - decision
    - confidence
    - stop_condition
  additionalProperties: true
status: active
version: v1.0.0
