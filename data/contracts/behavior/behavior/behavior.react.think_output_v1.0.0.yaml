capability: behavior.react.think
component_type: behavior
description: Output contract for behavior.react.think - результат рассуждения ReAct
direction: output
schema_data:
  type: object
  properties:
    analysis:
      type: object
      description: Анализ текущей ситуации
      properties:
        current_situation:
          type: string
          description: Текущая ситуация и контекст
        progress_assessment:
          type: string
          description: Оценка прогресса к цели
        confidence:
          type: number
          description: Уверенность в решении (0.0-1.0)
          minimum: 0.0
          maximum: 1.0
        errors_detected:
          type: boolean
          description: Обнаружены ли ошибки
          default: false
      required:
        - current_situation
        - progress_assessment
        - confidence
    recommended_action:
      type: object
      description: Рекомендованное действие
      properties:
        action_type:
          type: string
          description: Тип действия
          default: execute_capability
        capability_name:
          type: string
          description: Имя capability для выполнения
        parameters:
          type: object
          description: Параметры для capability
          additionalProperties: true
        reasoning:
          type: string
          description: Обоснование выбора действия
      required:
        - capability_name
        - reasoning
    needs_rollback:
      type: boolean
      description: Требуется ли откат
      default: false
    rollback_steps:
      type: integer
      description: Количество шагов для отката
      default: 0
  required:
    - analysis
    - recommended_action
  additionalProperties: false
status: active
version: v1.0.0
