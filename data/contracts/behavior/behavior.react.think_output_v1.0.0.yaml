capability: behavior.react.think
component_type: behavior
description: "Выходной контракт для рассуждения ReAct с поддержкой составных вопросов и каскадным самоанализом"
direction: output
schema_data:
  type: object
  properties:
    analysis_question_decomposition:
      type: string
      description: "Составной ли вопрос? Выдели подвопросы. Определи зависимости (параллельно или последовательно)."

    analysis_subquestions_tracking:
      type: string
      description: "Статус каждого подвопроса: [решён / в работе / требует данных / ошибка]. Что уже собрано по каждому?"

    analysis_progress:
      type: string
      description: "Общий прогресс: сколько подвопросов закрыто? Насколько близок к финальному ответу?"

    analysis_deficit:
      type: string
      description: "Каких данных не хватает для текущего подвопроса? Что блокирует следующий шаг?"

    analysis_data_quality:
      type: string
      description: "Достоверны ли полученные данные? Есть ли противоречия, пустые результаты или артефакты?"

    analysis_empty_error_strategy:
      type: string
      description: "Если результат пустой/ошибочный: изменить фильтры, сменить инструмент, пропустить подвопрос или использовать fallback?"

    analysis_tool_choice:
      type: string
      description: "Какой инструмент закроет текущий дефицит? Почему именно он?"

    analysis_parameter_sources:
      type: string
      description: "Откуда берутся параметры: исходный вопрос, история шагов, результат предыдущего инструмента?"

    analysis_parameter_validation:
      type: string
      description: "Все ли обязательные поля заполнены? Типы и диапазоны корректны? Нет ли конфликтов?"

    analysis_alternative_paths:
      type: string
      description: "План Б: если инструмент вернёт ошибку/пустоту, что делать дальше?"

    analysis_stop:
      type: string
      description: "Все подвопросы решены? Данные полные? Можно ли переходить к final_answer?"

    analysis_final:
      type: string
      description: "Итоговое обоснование: какой next_action и parameters выбираю для следующего шага?"

    stop_condition:
      type: boolean
      description: "Флаг завершения цикла (true, если все подвопросы решены и цель достигнута)"
    stop_reason:
      type: string
      description: "Причина остановки"
    decision:
      type: object
      properties:
        next_action:
          type: string
          description: "Имя следующего действия (capability_name)"
        parameters:
          type: object
          description: "Словарь параметров для next_action"
      required: ["next_action", "parameters"]

  required:
    - analysis_question_decomposition
    - analysis_subquestions_tracking
    - analysis_progress
    - analysis_deficit
    - analysis_data_quality
    - analysis_empty_error_strategy
    - analysis_tool_choice
    - analysis_parameter_sources
    - analysis_parameter_validation
    - analysis_alternative_paths
    - analysis_stop
    - analysis_final
    - stop_condition
    - decision

metadata:
  author: system
  created: '2026-04-20'
  description: "Контракт с поддержкой составных вопросов, трекингом подвопросов и каскадной логикой анализа"
status: active
version: v2.0.0