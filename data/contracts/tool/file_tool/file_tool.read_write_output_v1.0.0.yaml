capability: file_tool.read_write
version: v1.0.0
status: active
component_type: tool
direction: output
description: Output contract for file tool read/write operations
schema_data:
  type: object
  properties:
    success:
      type: boolean
      description: Operation success status
    data:
      type: object
      description: Operation result data
      properties:
        content:
          type: string
          description: File content (for read operation)
        size:
          type: integer
          description: File size in bytes
        path:
          type: string
          description: File path
        items:
          type: array
          description: Directory items (for list operation)
          items:
            type: object
    error:
      type: string
      description: Error message (if success is false)
  required:
    - success
