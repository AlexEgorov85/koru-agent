capability: sql_generation.generate_query
component_type: tool
direction: output
description: "Выходной контракт для генерации SQL с обязательным самоанализом"
schema_data:
  type: object
  properties:
    analysis_understanding:
      type: string
      description: "1. Понимание запроса: Какие сущности, условия и связи упоминаются пользователем?"
    analysis_schema:
      type: string
      description: "2. Анализ схемы: Какие таблицы и колонки требуются? Есть ли необходимые JOIN или WHERE?"
    analysis_strategy:
      type: string
      description: "3. Выбор стратегии: Будет ли это простой SELECT, агрегация, подзапрос или CTE? Почему выбран этот подход?"
    analysis_validation:
      type: string
      description: "4. Валидация параметров: Все ли условия учтены? Корректны ли типы данных, экранирование и фильтры?"
    analysis_security:
      type: string
      description: "5. Безопасность: Соответствует ли запрос политике SELECT-ONLY? Нет ли рисков инъекций?"
    analysis_optimization:
      type: string
      description: "6. Оптимизация: Можно ли упростить структуру, добавить индексы или улучшить план выполнения?"
    generated_sql:
      type: string
      description: "Сгенерированный SQL-запрос. ТОЛЬКО код, без markdown-обёрток и комментариев."
    confidence_score:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: "7. Оценка уверенности: Насколько я уверен в корректности запроса (0.0-1.0)?"
    potential_issues:
      type: array
      items:
        type: string
      description: "8. Потенциальные проблемы: Ограничения схемы, возможные неточности или риски."
    final_check:
      type: string
      description: "9. Финальная проверка: Соответствует ли итоговый SQL исходному запросу и предоставленной схеме?"
  required:
    - analysis_understanding
    - analysis_schema
    - analysis_strategy
    - analysis_validation
    - analysis_security
    - analysis_optimization
    - generated_sql
    - confidence_score
    - potential_issues
    - final_check
status: active
version: v1.0.0
metadata:
  author: system
  created: '2026-04-15'
