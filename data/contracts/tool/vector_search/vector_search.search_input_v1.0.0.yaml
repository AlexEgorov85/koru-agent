capability: vector_search.search
version: v1.0.0
status: active
component_type: tool
direction: input
description: Input contract for vector search operation (any source)
schema_data:
  type: object
  properties:
    query:
      type: string
      description: "Текст запроса"
      minLength: 1
      maxLength: 10000
    top_k:
      type: integer
      description: "Количество результатов (null = без лимита, только min_score)"
      default: 10
      minimum: 1
      maximum: 100
      nullable: true
    min_score:
      type: number
      description: "Минимальный порог схожести"
      default: 0.5
      minimum: 0.0
      maximum: 1.0
    filters:
      type: object
      description: "Фильтры по метаданным"
      properties:
        book_id:
          type: array
          items:
            type: integer
        author_id:
          type: array
          items:
            type: integer
        genre:
          type: array
          items:
            type: string
        audit_id:
          type: array
          items:
            type: integer
        violation_id:
          type: array
          items:
            type: integer
        year_from:
          type: integer
        year_to:
          type: integer
    source:
      type: string
      description: "Источник векторного индекса (books/authors/audits/violations)"
      default: books
  required:
    - query
  additionalProperties: false
