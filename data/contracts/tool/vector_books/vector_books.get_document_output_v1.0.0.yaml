capability: vector_books.get_document
version: v1.0.0
status: active
component_type: tool
direction: output
description: Output contract for getting full book text
schema_data:
  type: object
  properties:
    book_id:
      type: integer
      description: "ID книги"
    chapters:
      type: array
      description: "Список глав с содержимым"
      items:
        type: object
        properties:
          chapter:
            type: integer
          content:
            type: string
  required:
    - book_id
    - chapters
  additionalProperties: false
