$schema: "http://json-schema.org/draft-07/schema#"
type: object
title: "VectorBooksSearchOutput"
description: "Результаты семантического поиска по книгам"
version: "v1.0.0"

properties:
  results:
    type: array
    description: "Список результатов поиска"
    items:
      type: object
      properties:
        chunk_id:
          type: string
        document_id:
          type: string
        book_id:
          type: integer
        chapter:
          type: integer
        score:
          type: number
        content:
          type: string
        metadata:
          type: object
  
  total_found:
    type: integer
    description: "Общее количество найденных результатов"

required:
  - results
  - total_found

additionalProperties: false
