capability: book_library.execute_script
component_type: tool
description: Output contract for book_library.execute_script - результат выполнения заготовленного SQL-скрипта
direction: output
schema_data:
  type: object
  properties:
    rows:
      type: array
      description: Результаты выполнения запроса
      items:
        type: object
        properties:
          id:
            type: integer
            description: ID книги
          title:
            type: string
            description: Название книги
          author:
            type: string
            description: Автор книги
          year:
            type: integer
            description: Год публикации
          isbn:
            type: string
            description: ISBN
          genre:
            type: string
            description: Жанр
          count:
            type: integer
            description: Количество (для агрегирующих запросов)
          book_count:
            type: integer
            description: Количество книг (для статистики)
          avg_year:
            type: number
            description: Средний год (для статистики)
    rowcount:
      type: integer
      description: Общее количество возвращённых строк
    execution_time:
      type: number
      description: Время выполнения в секундах
    script_name:
      type: string
      description: Имя выполненного скрипта
    execution_type:
      type: string
      description: Тип выполнения (static)
      enum:
        - static
  required:
    - rows
    - rowcount
status: active
version: v1.0.0
