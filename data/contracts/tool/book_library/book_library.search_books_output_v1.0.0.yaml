capability: book_library.search_books
component_type: skill
description: Output contract for book_library.search_books - результат динамического поиска книг
direction: output
schema_data:
  type: object
  properties:
    rows:
      type: array
      description: Результаты поиска книг
      items:
        type: object
        properties:
          id:
            type: integer
            description: ID книги
          title:
            type: string
            description: Название книги
          author:
            type: string
            description: Автор книги
          year:
            type: integer
            description: Год публикации
          isbn:
            type: string
            description: ISBN
          genre:
            type: string
            description: Жанр
    rowcount:
      type: integer
      description: Общее количество найденных книг
    execution_time:
      type: number
      description: Время выполнения в секундах
    sql_query:
      type: string
      description: Сгенерированный SQL-запрос (для отладки)
    execution_type:
      type: string
      description: Тип выполнения (dynamic)
      enum:
        - dynamic
  required:
    - rows
    - rowcount
status: active
version: v1.0.0
