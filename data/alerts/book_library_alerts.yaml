# ============================================================================
# АЛЕРТЫ НАВЫКА BOOK_LIBRARY
# ============================================================================
# Версия: v1.0.0
# Дата создания: 2026-02-17
# Описание: Правила для генерации алертов при аномалиях в работе навыка
# ============================================================================

alerts:
  # ============================================================================
  # КРИТИЧЕСКИЕ АЛЕРТЫ (Critical)
  # ============================================================================

  - name: book_library_high_error_rate_critical
    title: "Критический уровень ошибок в book_library"
    severity: critical
    description: |
      Уровень ошибок в навыке book_library превысил 20%.
      Возможные причины:
      - Проблемы с подключением к БД
      - Ошибки в SQL-запросах
      - Недоступность LLM сервиса
    condition:
      metric: book_library.error_rate
      operator: ">"
      threshold: 0.20
      time_window: 5m
      labels:
        execution_type: "*"
    actions:
      - notify: ops_team
      - escalate: true
      - runbook: https://wiki.company.com/runbooks/book_library_high_errors
    cooldown: 10m

  - name: book_library_service_down
    title: "Навык book_library недоступен"
    severity: critical
    description: |
      Навык book_library не отвечает на запросы.
      Требуется немедленная проверка!
    condition:
      metric: book_library.total_executions
      operator: "=="
      threshold: 0
      time_window: 2m
    actions:
      - notify: ops_team
      - notify: dev_team
      - escalate: true
      - restart_service: book_library
    cooldown: 5m

  # ============================================================================
  # ПРЕДУПРЕЖДЕНИЯ (Warning)
  # ============================================================================

  - name: book_library_high_error_rate_warning
    title: "Высокий уровень ошибок в book_library"
    severity: warning
    description: |
      Уровень ошибок в навыке book_library превысил 5%.
      Рекомендуется проверить логи и метрики.
    condition:
      metric: book_library.error_rate
      operator: ">"
      threshold: 0.05
      time_window: 5m
      labels:
        execution_type: "*"
    actions:
      - notify: dev_team
      - log: true
    cooldown: 15m

  - name: book_library_slow_execution
    title: "Медленное выполнение запросов"
    severity: warning
    description: |
      Среднее время выполнения запросов превысило 2 секунды.
      Возможные причины:
      - Медленные SQL-запросы
      - Высокая загрузка БД
      - Задержки LLM сервиса
    condition:
      metric: book_library.avg_execution_time_ms
      operator: ">"
      threshold: 2000
      time_window: 5m
      labels:
        percentile: p90
    actions:
      - notify: dev_team
      - log: true
    cooldown: 15m

  - name: book_library_static_slow_execution
    title: "Медленное выполнение static скриптов"
    severity: warning
    description: |
      Static скрипты выполняются дольше 500 мс.
      Это может указывать на проблемы с БД.
    condition:
      metric: book_library.avg_execution_time_ms
      operator: ">"
      threshold: 500
      time_window: 5m
      labels:
        execution_type: static
        percentile: p90
    actions:
      - notify: db_team
      - log: true
    cooldown: 15m

  - name: book_library_dynamic_slow_execution
    title: "Медленное выполнение dynamic поиска"
    severity: warning
    description: |
      Dynamic поиск выполняется дольше 5 секунд.
      Возможные причины:
      - Задержки LLM сервиса
      - Сложные SQL-запросы
    condition:
      metric: book_library.avg_execution_time_ms
      operator: ">"
      threshold: 5000
      time_window: 5m
      labels:
        execution_type: dynamic
        percentile: p90
    actions:
      - notify: dev_team
      - log: true
    cooldown: 15m

  - name: book_library_script_not_found
    title: "Частые запросы несуществующих скриптов"
    severity: warning
    description: |
      Зафиксировано более 10 запросов несуществующих скриптов за 5 минут.
      Возможные причины:
      - Ошибки в коде клиента
      - Устаревшая документация
    condition:
      metric: book_library.script_not_found_count
      operator: ">"
      threshold: 10
      time_window: 5m
    actions:
      - notify: dev_team
      - log: true
    cooldown: 30m

  - name: book_library_validation_errors
    title: "Частые ошибки валидации параметров"
    severity: warning
    description: |
      Зафиксировано более 20 ошибок валидации за 5 минут.
      Возможные причины:
      - Ошибки в коде клиента
      - Изменение контрактов
    condition:
      metric: book_library.validation_errors
      operator: ">"
      threshold: 20
      time_window: 5m
    actions:
      - notify: dev_team
      - log: true
    cooldown: 30m

  - name: book_library_llm_high_latency
    title: "Высокая задержка LLM сервиса"
    severity: warning
    description: |
      Задержка LLM вызова превысила 3 секунды.
      Это влияет на производительность dynamic поиска.
    condition:
      metric: book_library.llm_latency_ms
      operator: ">"
      threshold: 3000
      time_window: 5m
      labels:
        percentile: p90
    actions:
      - notify: ml_team
      - log: true
    cooldown: 15m

  - name: book_library_db_high_latency
    title: "Высокая задержка БД"
    severity: warning
    description: |
      Время выполнения SQL-запросов превысило 1 секунду.
      Возможные причины:
      - Блокировки в БД
      - Отсутствие индексов
      - Высокая нагрузка
    condition:
      metric: book_library.db_query_latency_ms
      operator: ">"
      threshold: 1000
      time_window: 5m
      labels:
        percentile: p90
    actions:
      - notify: db_team
      - log: true
    cooldown: 15m

  # ============================================================================
  # ИНФОРМАЦИОННЫЕ (Info)
  # ============================================================================

  - name: book_library_low_success_rate
    title: "Низкий процент успешных выполнений"
    severity: info
    description: |
      Процент успешных выполнений опустился ниже 90%.
      Рекомендуется провести анализ причин.
    condition:
      metric: book_library.success_rate
      operator: "<"
      threshold: 0.90
      time_window: 15m
    actions:
      - log: true
      - create_ticket: true
    cooldown: 1h

  - name: book_library_unusual_traffic
    title: "Аномальный трафик"
    severity: info
    description: |
      Зафиксирован необычный уровень трафика (резкий рост или падение).
      Рекомендуется проверить метрики.
    condition:
      metric: book_library.total_executions
      operator: "deviation"
      threshold: 3.0  # 3 стандартных отклонения
      time_window: 15m
      baseline_window: 24h
    actions:
      - log: true
    cooldown: 1h

  - name: book_library_cache_low_hit_rate
    title: "Низкий процент попаданий в кэш"
    severity: info
    description: |
      Процент попаданий в кэш промптов/контрактов ниже 50%.
      Это может влиять на производительность.
    condition:
      metric: book_library.cache_hit_rate
      operator: "<"
      threshold: 0.50
      time_window: 15m
    actions:
      - log: true
    cooldown: 1h

# ============================================================================
# КАНАЛЫ УВЕДОМЛЕНИЙ
# ============================================================================

notification_channels:
  ops_team:
    type: pagerduty
    service_key: "${PAGERDUTY_SERVICE_KEY}"
    urgency: high

  dev_team:
    type: slack
    channel: "#dev-alerts"
    webhook_url: "${SLACK_WEBHOOK_URL}"

  db_team:
    type: slack
    channel: "#db-alerts"
    webhook_url: "${SLACK_DB_WEBHOOK_URL}"

  ml_team:
    type: slack
    channel: "#ml-alerts"
    webhook_url: "${SLACK_ML_WEBHOOK_URL}"

# ============================================================================
# НАСТРОЙКИ
# ============================================================================

settings:
  evaluation_interval: 30s
  default_cooldown: 15m
  max_alerts_per_hour: 100
  alert_aggregation: true
  business_hours_only: false
